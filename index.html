<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BookHockeys</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
  *{ box-sizing: border-box; margin: 0; padding: 0; }

  html, body{
    height: 100%;
    background: #39ff14;
    font-family: 'Luckiest Guy', system-ui, sans-serif;
    letter-spacing: 1px;
    overflow: hidden;
  }

  /* Background video */
  .bg-video{
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  /* Neon green tint overlay so the video blends with the brand color */
  .tint{
    position: fixed;
    inset: 0;
    background: #39ff14;
    opacity: 0.55;
    mix-blend-mode: multiply;
    z-index: 1;
    pointer-events: none;
  }
  .tint-2{
    position: fixed;
    inset: 0;
    background: #39ff14;
    opacity: 0.30;
    z-index: 2;
    pointer-events: none;
  }

  /* Content */
  .content{
    position: relative;
    z-index: 3;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    gap: 40px;
  }

  .logo{
    width: min(90vw, 560px);
    height: auto;
    display: block;
    filter: drop-shadow(6px 8px 0 rgba(0,0,0,0.5));
  }

  .links{
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn{
    display: inline-flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: #0a0a0a;
    background: #ffffff;
    padding: 16px 28px;
    font-size: 26px;
    border: 4px solid #0a0a0a;
    box-shadow: 6px 6px 0 #0a0a0a;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .btn:hover{
    transform: translate(-3px, -3px);
    box-shadow: 9px 9px 0 #0a0a0a;
  }
  .btn svg{ width: 28px; height: 28px; }
  .btn.kick{ background: #53fc18; }
  .btn.twitch{ background: #9146ff; color: #ffffff; }

  /* Audio controls panel (bottom-right) */
  .audio-panel{
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
    min-width: 180px;
  }

  /* Volume slider housing */
  .vol-wrap{
    background: #ffffff;
    border: 4px solid #0a0a0a;
    box-shadow: 5px 5px 0 #0a0a0a;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: opacity .25s ease, transform .25s ease;
  }
  .vol-wrap.hidden{
    opacity: 0;
    pointer-events: none;
    transform: translateY(8px);
  }
  .vol-wrap svg{
    width: 22px;
    height: 22px;
    fill: #0a0a0a;
    flex-shrink: 0;
  }

  /* Custom range slider */
  input[type="range"].vol{
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 10px;
    background: transparent;
    cursor: pointer;
  }
  input[type="range"].vol::-webkit-slider-runnable-track{
    height: 10px;
    background: #0a0a0a;
    border: 2px solid #0a0a0a;
  }
  input[type="range"].vol::-moz-range-track{
    height: 10px;
    background: #0a0a0a;
    border: 2px solid #0a0a0a;
  }
  input[type="range"].vol::-webkit-slider-thumb{
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    background: #ffe82e;
    border: 3px solid #0a0a0a;
    margin-top: -7px;
    cursor: grab;
  }
  input[type="range"].vol::-moz-range-thumb{
    width: 18px;
    height: 18px;
    background: #ffe82e;
    border: 3px solid #0a0a0a;
    cursor: grab;
  }

  /* Mute/unmute button */
  .sound-btn{
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 20px;
    font-family: 'Luckiest Guy', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    color: #0a0a0a;
    background: #ffe82e;
    border: 4px solid #0a0a0a;
    box-shadow: 5px 5px 0 #0a0a0a;
    cursor: pointer;
    transition: transform .12s ease, box-shadow .12s ease, background .2s ease;
  }
  .sound-btn:hover{
    transform: translate(-2px, -2px);
    box-shadow: 7px 7px 0 #0a0a0a;
  }
  /* Pulse animation while muted to draw attention */
  .sound-btn.muted{
    animation: pulse 1.4s ease-in-out infinite;
  }
  .sound-btn svg{ width: 22px; height: 22px; fill: #0a0a0a; }

  @keyframes pulse{
    0%,100%{ transform: scale(1); }
    50%{ transform: scale(1.05); }
  }

  @media (max-width: 480px){
    .btn{ font-size: 20px; padding: 14px 22px; }
    .btn svg{ width: 22px; height: 22px; }
    .audio-panel{ bottom: 16px; right: 16px; min-width: 150px; }
    .sound-btn{ font-size: 16px; padding: 10px 16px; }
    .vol-wrap{ padding: 10px 12px; }
  }
</style>
</head>
<body>

  <video id="bgvid" class="bg-video" autoplay muted loop playsinline preload="auto">
    <source src="bookmentions.mp4" type="video/mp4">
  </video>

  <div class="tint"></div>
  <div class="tint-2"></div>

  <div class="content">
    <img class="logo" src="logo.png" alt="BookHockeys" />

    <div class="links">
      <a class="btn kick" href="https://kick.com/bookhockeys" target="_blank" rel="noopener">
        <svg viewBox="0 0 933 300" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
          <path d="M0 0h100v100h100V0h100v100H300v100H200v100H100V200H0zM400 0h100v300H400zM533 0h100v100h100V0h100v100H833V200H733v100H633V200H533zM866 0h67v100h-67zm0 200h67v100h-67z"/>
        </svg>
        KICK
      </a>
      <a class="btn twitch" href="https://twitch.tv/bookhockeys" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
          <path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z"/>
        </svg>
        TWITCH
      </a>
    </div>
  </div>

  <!-- Audio controls -->
  <div class="audio-panel">
    <div id="volWrap" class="vol-wrap hidden">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
      </svg>
      <input id="vol" class="vol" type="range" min="0" max="100" value="80" aria-label="Volume" />
    </div>
    <button id="soundBtn" class="sound-btn muted" aria-label="Toggle sound">
      <svg id="soundIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.17v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
      </svg>
      <span id="soundLabel">TAP FOR SOUND</span>
    </button>
  </div>

  <script>
    (function(){
      const vid = document.getElementById('bgvid');
      const btn = document.getElementById('soundBtn');
      const label = document.getElementById('soundLabel');
      const icon = document.getElementById('soundIcon');
      const volWrap = document.getElementById('volWrap');
      const volSlider = document.getElementById('vol');

      // Icon paths
      const iconUnmuted = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
      const iconMuted = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.17v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';

      // Initialize volume from slider default
      vid.volume = volSlider.value / 100;

      function showUnmuted(){
        vid.muted = false;
        vid.play().catch(() => {});
        btn.classList.remove('muted');
        label.textContent = 'TAP TO MUTE';
        icon.innerHTML = iconUnmuted;
        volWrap.classList.remove('hidden');
      }

      function showMuted(){
        vid.muted = true;
        btn.classList.add('muted');
        label.textContent = 'TAP FOR SOUND';
        icon.innerHTML = iconMuted;
        volWrap.classList.add('hidden');
      }

      // Try to autoplay with sound immediately (works if browser has granted permission
      // for this origin, e.g. from a previous visit). Fallback: stays muted until interaction.
      function tryAutoUnmute(){
        vid.muted = false;
        const p = vid.play();
        if (p && typeof p.then === 'function'){
          p.then(() => {
            // success — sound is on
            showUnmuted();
          }).catch(() => {
            // blocked by browser — keep muted, wait for user interaction
            vid.muted = true;
            vid.play().catch(() => {});
          });
        }
      }

      // Attempt immediately and also shortly after (some browsers need a tick)
      tryAutoUnmute();

      // Auto-unmute on any first interaction anywhere on the page
      function firstInteract(e){
        // don't hijack clicks on links or on the audio controls themselves
        if (e.target && e.target.closest){
          if (e.target.closest('a.btn')) return;
          if (e.target.closest('#soundBtn')) return;
          if (e.target.closest('#volWrap')) return;
        }
        if (vid.muted){
          showUnmuted();
        }
        // remove after first use
        document.removeEventListener('click', firstInteract, true);
        document.removeEventListener('touchstart', firstInteract, true);
        document.removeEventListener('keydown', firstInteract, true);
        document.removeEventListener('scroll', firstInteract, true);
        document.removeEventListener('mousemove', firstInteract, true);
      }
      document.addEventListener('click', firstInteract, true);
      document.addEventListener('touchstart', firstInteract, true);
      document.addEventListener('keydown', firstInteract, true);
      document.addEventListener('scroll', firstInteract, true);
      document.addEventListener('mousemove', firstInteract, true);

      // Mute/unmute toggle button
      btn.addEventListener('click', function(){
        if (vid.muted){
          showUnmuted();
        } else {
          showMuted();
        }
      });

      // Volume slider
      volSlider.addEventListener('input', function(){
        const v = volSlider.value / 100;
        vid.volume = v;
        // if user drags to 0, treat as mute; above 0, ensure unmuted
        if (v === 0){
          vid.muted = true;
        } else if (vid.muted){
          vid.muted = false;
          showUnmuted();
        }
      });
    })();
  </script>

</body>
</html>
