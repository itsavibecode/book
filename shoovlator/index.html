<script>
// ===========================================================================
// Shoovlator transformation engine
// All rule-based; no network calls.
// ===========================================================================

const COMPARATIVE_STACKS = [
  'many more enough',
  'much more',
  'more many',
  'way most more',
  'more enough than',
  'much more better',
  'more many enough'
];

const VERY_STACKS = [
  'much most very',
  'very most absolute',
  'most very enough',
  'so very much most',
  'very absolutely most'
];

const FILLERS = [
  'just',
  'really just',
  'basically just',
  'kind of just',
  'for sure just',
  'actually just'
];

const TAILS = [
  'than others',
  'than usually',
  'than most',
  'and stuff',
  'and the things',
  'or whatever else',
  'more or less',
  'and such things',
  'than usual ones'
];

const ADJ_BOOST = {
  good:   'more good of quality',
  bad:    'much worser than usual',
  big:    'much bigger of size',
  small:  'more smaller of size',
  fast:   'more faster than most',
  slow:   'much slower of speed',
  smart:  'much more cleverer enough',
  dumb:   'more dumber than others',
  tall:   'more taller of height',
  short:  'much shorter enough',
  happy:  'more happier than usually',
  sad:    'much sadder of mood',
  easy:   'more easier than most',
  hard:   'much harder enough',
  old:    'more older of age',
  new:    'much newer enough',
  rich:   'more richer of moneys',
  poor:   'much poorer of moneys',
  strong: 'more stronger of strength',
  weak:   'much weaker enough',
  cool:   'more cooler than most',
  nice:   'much nicer of feeling',
  funny:  'more funnier than usual',
  great:  'much most greater enough',
  best:   'much most best of all',
  worst:  'more worsest than others',
  hot:    'much hotter of temperature',
  cold:   'more colder of temperature'
};

const PLURAL_WEIRD = {
  people:      'the peoples',
  money:       'the moneys',
  information: 'the informations',
  advice:      'many advices',
  feedback:    'feedbacks of opinion',
  research:    'many researches',
  knowledge:   'many knowledges',
  music:       'the musics',
  homework:    'the homeworks',
  furniture:   'the furnitures',
  software:    'the softwares',
  evidence:    'many evidences'
};

// Pass 6's bare "are" -> "is" was redundant with pass 7's pronoun-driven
// "they/we/you are" -> "... is" swap, AND it broke the "are we not" Shoovy-ism
// by mangling the "are" before pass 7b could see the full phrase. Dropped.
const VERB_SWAPS = {
  is:   'be',
  was:  'has been',
  were: 'has was'
};

const SUBJ_VERB_SWAP = { have: 'has', do: 'does', are: 'is' };

// Shoovy uses the superlative where the comparative belongs.
const WRONG_SUPERLATIVE = {
  faster: 'fastest'
};

// Shoovy sometimes prefers "swiftly" over "quickly".
const ADV_SWAPS = {
  quickly: 'swiftly'
};

// Sentence prefixes Shoovy attaches based on context. Detection is heuristic
// — there's no semantic understanding here, just shape/word matching.
const POINT_PREFIX    = 'On God';
const APOLOGY_PREFIX  = 'My bad';
const SURPRISE_PREFIX = 'Ay fucking yo bro';

// "Ends with" or "starts with" tests for prefix triggering.
const SURPRISE_TEST = (s) =>
  /^\s*(wow|what|huh|holy|whoa|woah|jeez|geez|damn|oh\s+my|oh\s+god|no\s+way|hold\s+on|wait)\b/i.test(s)
  || /[!]+\s*$/.test(s.trim());

const APOLOGY_TEST = (s) =>
  /\b(sorry|my\s+fault|messed\s+up|fucked\s+up|screwed\s+up|i\s+forgot|forgive\s+me|my\s+mistake|apologi[sz]e|i\s+shouldn'?t|i\s+should\s+not\s+have)\b/i.test(s);

const POINT_TEST = (s) =>
  /\.\s*$/.test(s.trim()) && !SURPRISE_TEST(s) && !APOLOGY_TEST(s);

const maybe = (p) => Math.random() < p;
const pick  = (arr) => arr[Math.floor(Math.random() * arr.length)];

function caseMatch(replacement, original) {
  if (!original.length) return replacement;
  const c = original[0];
  if (c === c.toUpperCase() && c !== c.toLowerCase()) {
    return replacement[0].toUpperCase() + replacement.slice(1);
  }
  return replacement;
}

function escapeRe(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ---------------------------------------------------------------------------
// Change tracking. Each forward pass wraps its replacements with sentinel
// chars (SOH, STX, ETX) that survive subsequent regex passes. After all passes
// run, renderMarked() converts these wrapper sentinels into <span> elements
// for the highlight-on-hover UI.
//
// "INSERTED" marks transformations where the original text was nothing —
// inserted fillers and tails. The CSS shows a different tooltip ("(inserted)")
// for those. Using ∅ (empty set) since it can't appear in user input.
// ---------------------------------------------------------------------------
const M_OPEN = '', M_SEP = '', M_CLOSE = '';
const INSERTED_MARK = '∅';

// ID-based wrap. Earlier versions stored the original phrase INLINE in the
// sentinel block, which let later passes see the original text inside it
// and re-wrap — a nested-wrap bug. Now the sentinel only contains an ID;
// the original lives in wrapState.map so subsequent passes can't see it.
const wrapState = { counter: 0, map: new Map() };

function wrap(orig, repl) {
  const id = ++wrapState.counter;
  wrapState.map.set(id, orig || INSERTED_MARK);
  return M_OPEN + id + M_SEP + repl + M_CLOSE;
}

function escapeHtml(s) {
  return s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
}
function escapeAttr(s) {
  return s.replace(/[&<>"']/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

function renderMarked(s) {
  // Non-greedy because sentinels can't nest (the [^...] excludes them).
  const re = /([^]*)([^]*)/g;
  let out = '';
  let last = 0;
  let m;
  while ((m = re.exec(s)) !== null) {
    out += escapeHtml(s.slice(last, m.index));
    const orig = wrapState.map.get(parseInt(m[1], 10)) || INSERTED_MARK;
    out += `<span class="changed" data-orig="${escapeAttr(orig)}">${escapeHtml(m[2])}</span>`;
    last = re.lastIndex;
  }
  out += escapeHtml(s.slice(last));
  return out;
}

function shoovlate(text, intensity) {
  if (!text || !text.trim()) return '';
  // Reset per call so the wrap map doesn't grow unboundedly across renders.
  wrapState.counter = 0;
  wrapState.map.clear();
  const parts = text.split(/(?<=[.!?])\s+/);
  return parts.map(p => shoovlateSentence(p, intensity)).join(' ');
}

function shoovlateSentence(s, i) {
  // Each pass wraps its replacement with sentinels so renderMarked can
  // highlight what changed. Order is preserved from the pre-tracking engine
  // (homophones before subject-verb swap, "faster" before "fast" boost).

  // 0z) Shoovy-ism: "I don't know" / "I do not know" -> "I dunno". Must run
  // BEFORE the don't->donut homophone pass — otherwise "I don't know"
  // becomes "I donut know" and dunno never matches.
  s = s.replace(/\bi\s+(do not|don['’]t)\s+know\b/gi, m =>
    maybe(0.65 + i * 0.25) ? wrap(m, caseMatch('I dunno', m)) : m
  );

  // 0y) Shoovy-ism: "thankful" -> "thank you" ("I am thank you").
  s = s.replace(/\bthankful\b/gi, m =>
    maybe(0.70 + i * 0.25) ? wrap(m, caseMatch('thank you', m)) : m
  );

  // 0a) Shoovy-ism: "faster" -> "fastest" (superlative for comparative).
  for (const [k, v] of Object.entries(WRONG_SUPERLATIVE)) {
    const re = new RegExp(`\\b${k}\\b`, 'gi');
    s = s.replace(re, m => maybe(0.80 + i * 0.20) ? wrap(m, caseMatch(v, m)) : m);
  }

  // 0b) Shoovy-ism: "quickly" -> "swiftly" (sometimes).
  for (const [k, v] of Object.entries(ADV_SWAPS)) {
    const re = new RegExp(`\\b${k}\\b`, 'gi');
    s = s.replace(re, m => maybe(0.45 + i * 0.30) ? wrap(m, caseMatch(v, m)) : m);
  }

  // 0c) Shoovy-ism: "don't" -> "donut", "do not" -> "dough knot".
  s = s.replace(/\bdon['’]t\b/gi, m =>
    maybe(0.85 + i * 0.15) ? wrap(m, caseMatch('donut', m)) : m
  );
  s = s.replace(/\bdo not\b/gi, m =>
    maybe(0.85 + i * 0.15) ? wrap(m, caseMatch('dough knot', m)) : m
  );

  // 1) stack "more"
  s = s.replace(/\bmore\b/gi, m =>
    maybe(0.55 + i * 0.40) ? wrap(m, caseMatch(pick(COMPARATIVE_STACKS), m)) : m
  );

  // 2) stack "very"
  s = s.replace(/\bvery\b/gi, m =>
    maybe(0.45 + i * 0.45) ? wrap(m, caseMatch(pick(VERY_STACKS), m)) : m
  );

  // 3) adjective boost
  for (const [k, v] of Object.entries(ADJ_BOOST)) {
    const re = new RegExp(`\\b${k}\\b`, 'gi');
    s = s.replace(re, m => maybe(0.30 + i * 0.50) ? wrap(m, caseMatch(v, m)) : m);
  }

  // 4) noun plural weirdness
  for (const [k, v] of Object.entries(PLURAL_WEIRD)) {
    const re = new RegExp(`\\b${k}\\b`, 'gi');
    s = s.replace(re, m => maybe(0.35 + i * 0.45) ? wrap(m, caseMatch(v, m)) : m);
  }

  // 5) "has/have/had X" -> insert filler before X (filler is the inserted text)
  s = s.replace(/\b(has|have|had)\s+([A-Za-z]+)\b/g, (m, aux, verb) => {
    if (/^(been|just|really|kind|basically|for|actually)$/i.test(verb)) return m;
    if (!maybe(0.45 + i * 0.40)) return m;
    return `${aux} ${wrap('', pick(FILLERS))} ${verb}`;
  });

  // 6) is/are/was/were swaps (low rate)
  s = s.replace(/\b(is|are|was|were)\b/gi, m => {
    if (!maybe(0.08 + i * 0.22)) return m;
    const repl = VERB_SWAPS[m.toLowerCase()];
    return repl ? wrap(m, caseMatch(repl, m)) : m;
  });

  // 7) subject-verb mismatch on plural pronouns
  s = s.replace(/\b(they|we|you)\s+(have|do|are)\b/gi, (m, pron, verb) => {
    if (!maybe(0.12 + i * 0.30)) return m;
    const swap = SUBJ_VERB_SWAP[verb.toLowerCase()];
    return swap ? `${pron} ${wrap(verb, caseMatch(swap, verb))}` : m;
  });

  // 7b) Shoovy-ism: "are we not" -> "is we are not". Runs AFTER pass 6 and
  // pass 7 so the inserted "is" / "we are" inside the replacement isn't
  // re-processed by them (the ID-based wrap keeps the ORIGINAL out of band,
  // but the REPLACEMENT is still visible to later passes).
  s = s.replace(/\bare we not\b/gi, m =>
    maybe(0.80 + i * 0.20) ? wrap(m, caseMatch('is we are not', m)) : m
  );

  // 8) clause tail before terminal punctuation (tail is inserted from nothing)
  s = s.replace(/([.!?])\s*$/, (m, punct) => {
    if (!maybe(0.35 + i * 0.40)) return m;
    return ` ${wrap('', pick(TAILS))}${punct}`;
  });
  if (!/[.!?]\s*$/.test(s) && s.trim() && maybe(0.25 + i * 0.35)) {
    s = `${s.replace(/\s+$/, '')} ${wrap('', pick(TAILS))}`;
  }

  // 9) Stutter passes (mutually exclusive — at most one per sentence).
  // First-word stutter has priority; the mid-sentence emphasis stutter only
  // fires if the first-word one didn't, keeping the output less repetitive.
  stutterFiredThisSentence = false;
  s = maybeStutter(s, i);

  // 9b) Mid-sentence emphasis stutter on a 4+ letter content word. Skips
  // anything that's already inside a wrap block (so we never nest sentinels).
  s = maybeEmphasisStutter(s, i);

  // 10) Sentence prefix injection ("On God,", "My bad,", "Ay fucking yo bro,").
  // Runs LAST so the prefix isn't fed back into any earlier pass.
  s = maybeInjectPrefix(s, i);

  return s;
}

// Stutter forms: weighted toward simple letter-stutters over word repetition
// (whole-word repeats are visually heavier and quickly feel repetitive when
// stacked on top of fillers, tails, and prefixes).
function pickStutterForm(word) {
  const c = word[0];
  const r = Math.random();
  if (r < 0.55) return `${c}-${word}`;          // 55% F-Faster
  if (r < 0.80) return `${c}-${c}-${word}`;     // 25% F-F-Faster
  if (r < 0.94) return `${word} ${word}`;       // 14% Faster Faster
  return `${word} ${word} ${word}`;             //  6% Faster Faster Faster
}

// `stutterFiredThisSentence` lets the two stutter passes be mutually exclusive
// — at most one stutter per sentence so output doesn't pile up.
let stutterFiredThisSentence = false;

function maybeStutter(s, i) {
  if (!maybe(0.10 + i * 0.18)) return s;
  const m = s.match(/^(\s*)([A-Za-z][A-Za-z']*)\b/);
  if (!m) return s;
  const lead = m[1], word = m[2];
  stutterFiredThisSentence = true;
  return lead + wrap(word, pickStutterForm(word)) + s.slice(m[0].length);
}

// Mid-sentence emphasis stutter — picks a 4+ letter word outside of any
// existing wrap block (so we never nest sentinels) and stutters it.
function maybeEmphasisStutter(s, i) {
  if (stutterFiredThisSentence) return s;
  if (!maybe(0.05 + i * 0.10)) return s;

  // Find every wrap block's character range so we can avoid stuttering text
  // that an earlier pass already wrapped.
  const wrapRanges = [];
  const wrapRe = /\d+[^]*/g;
  let wm;
  while ((wm = wrapRe.exec(s)) !== null) {
    wrapRanges.push([wm.index, wm.index + wm[0].length]);
  }

  // Candidate content words: 4+ letters, not already at sentence start
  // (that's covered by maybeStutter), not inside a wrap block.
  const candidates = [];
  const wordRe = /\b[A-Za-z][A-Za-z']{3,}\b/g;
  let mm;
  while ((mm = wordRe.exec(s)) !== null) {
    const word = mm[0];
    const start = mm.index, end = start + word.length;
    if (start === 0) continue;
    if (wrapRanges.some(([a, b]) => start >= a && end <= b)) continue;
    candidates.push({ start, end, word });
  }
  if (candidates.length === 0) return s;

  const choice = candidates[Math.floor(Math.random() * candidates.length)];
  return s.slice(0, choice.start)
    + wrap(choice.word, pickStutterForm(choice.word))
    + s.slice(choice.end);
}

function maybeInjectPrefix(s, i) {
  if (!s.trim()) return s;
  const stripLead = (str) => str.replace(/^\s+/, '');

  // Apology beats surprise beats point — first match wins. Rates dialled
  // back from earlier so prefixes don't pile up on top of the other passes.
  if (APOLOGY_TEST(s) && maybe(0.40 + i * 0.30)) {
    return wrap('', APOLOGY_PREFIX + ',') + ' ' + stripLead(s);
  }
  if (SURPRISE_TEST(s) && maybe(0.35 + i * 0.30)) {
    return wrap('', SURPRISE_PREFIX + ',') + ' ' + stripLead(s);
  }
  if (POINT_TEST(s) && maybe(0.10 + i * 0.20)) {
    return wrap('', POINT_PREFIX + ',') + ' ' + stripLead(s);
  }
  return s;
}

// ===========================================================================
// Reverse pass: best-effort Shoovy -> English.
// Lossy by nature (forward is probabilistic + many-to-one) — undoes the
// distinctive deterministic patterns and accepts that some real English
// like "donut" or "than others" may also get reversed.
// ===========================================================================

function deshoovlate(text) {
  if (!text || !text.trim()) return '';
  const parts = text.split(/(?<=[.!?])\s+/);
  return parts.map(deshoovlateSentence).join(' ');
}

function deshoovlateSentence(s) {
  // 0) Strip Shoovy sentence prefixes ("On God,", "My bad,", "Ay fucking yo bro,").
  s = s.replace(/^\s*(On God|My bad|Ay fucking yo bro|Ay yo bro|Ay bro|Yo bro)\s*,\s*/i, '');

  // 0a) Undo single-letter stutter at sentence start AND mid-sentence. Only
  // treat as a stutter if the prefix letter matches the first letter of the
  // following word — so "X-ray" or "co-op" survive untouched.
  s = s.replace(/\b([A-Za-z])-\1-([A-Za-z]+)\b/g, (m, c, word) =>
    word[0].toLowerCase() === c.toLowerCase() ? word : m
  );
  s = s.replace(/\b([A-Za-z])-([A-Za-z]+)\b/g, (m, c, word) =>
    word[0].toLowerCase() === c.toLowerCase() ? word : m
  );

  // 0a-2) Undo whole-word repetition stutters. Triple is rare in English so
  // always safe to collapse; double we restrict to 4+ letter words to leave
  // legitimate "had had" / "is is" / "the the" alone.
  s = s.replace(/\b(\w+)\s+\1\s+\1\b/gi, '$1');
  s = s.replace(/\b(\w{4,})\s+\1\b/gi, '$1');

  // 0b) "I dunno" -> "I don't know"
  s = s.replace(/\bi\s+dunno\b/gi, m => caseMatch("I don't know", m));

  // 0c) "am/is/are/be(en|ing) thank you" -> "... thankful". Only after a
  // copula — bare "thank you" is real English and must be left alone.
  s = s.replace(/\b(am|is|are|be|been|being|was|were)\s+thank\s+you\b/gi,
    (m, cop) => `${cop} thankful`
  );

  // 0d) "is we are not" -> "are we not"
  s = s.replace(/\bis we are not\b/gi, m => caseMatch('are we not', m));

  // 1) Shoovy-isms — distinct enough to reverse confidently.
  s = s.replace(/\bdough knot\b/gi, m => caseMatch('do not', m));
  s = s.replace(/\bdonut\b/gi,      m => caseMatch("don't",  m));
  s = s.replace(/\bfastest\b/gi,    m => caseMatch('faster', m));
  s = s.replace(/\bswiftly\b/gi,    m => caseMatch('quickly', m));

  // 2) Adjective boost reverse — these are long, distinctive phrases. They
  // overlap with comparative-stack fragments ("much more cleverer enough"
  // starts with "much more"), so they MUST run before stack reversal.
  for (const [k, v] of Object.entries(ADJ_BOOST)) {
    const re = new RegExp('\\b' + escapeRe(v) + '\\b', 'gi');
    s = s.replace(re, m => caseMatch(k, m));
  }

  // 3) Plural weirdness reverse.
  for (const [k, v] of Object.entries(PLURAL_WEIRD)) {
    const re = new RegExp('\\b' + escapeRe(v) + '\\b', 'gi');
    s = s.replace(re, m => caseMatch(k, m));
  }

  // 4) Comparative stacks -> "more".
  for (const stack of COMPARATIVE_STACKS) {
    const re = new RegExp('\\b' + escapeRe(stack) + '\\b', 'gi');
    s = s.replace(re, m => caseMatch('more', m));
  }

  // 5) Very stacks -> "very".
  for (const stack of VERY_STACKS) {
    const re = new RegExp('\\b' + escapeRe(stack) + '\\b', 'gi');
    s = s.replace(re, m => caseMatch('very', m));
  }

  // 6) Filler removal: "has/have/had FILLER X" -> "has/have/had X".
  for (const filler of FILLERS) {
    const re = new RegExp('\\b(has|have|had)\\s+' + escapeRe(filler) + '\\s+', 'gi');
    s = s.replace(re, '$1 ');
  }

  // 7) Distinctive verb swap reverse — only "has was" is unambiguous.
  // ("be" -> "is" and "has been" -> "was" would mangle legitimate English.)
  s = s.replace(/\bhas was\b/gi, m => caseMatch('were', m));

  // 8) Subject-verb mismatch reverse on plural pronouns.
  s = s.replace(/\b(they|we|you)\s+(has|does|is)\b/gi, (m, pron, verb) => {
    const swap = { has: 'have', does: 'do', is: 'are' }[verb.toLowerCase()];
    return swap ? `${pron} ${caseMatch(swap, verb)}` : m;
  });

  // 9) Tail removal — strip one or more trailing tails before terminal punct.
  const tailAlt = TAILS.map(escapeRe).join('|');
  s = s.replace(new RegExp('(?:\\s+(?:' + tailAlt + '))+\\s*([.!?])', 'gi'), '$1');
  s = s.replace(new RegExp('(?:\\s+(?:' + tailAlt + '))+\\s*$', 'gi'), '');

  return s;
}

// ===========================================================================
// UI wiring
// ===========================================================================

const input         = document.getElementById('input');
const output        = document.getElementById('output');
const intensityEl   = document.getElementById('intensity');
const intensityLbl  = document.getElementById('intensityLabel');
const clearBtn      = document.getElementById('clearBtn');
const copyBtn       = document.getElementById('copyBtn');
const rerollBtn     = document.getElementById('rerollBtn');
const swapBtn       = document.getElementById('swapBtn');
const shareBtn      = document.getElementById('shareBtn');
const leftLabel     = document.getElementById('leftLabel');
const rightLabel    = document.getElementById('rightLabel');

let direction = 'forward'; // 'forward' = English -> Shoovy, 'reverse' = Shoovy -> English
let debounceTimer = null;

const PLACEHOLDERS = {
  forward: {
    input:  'He has done it more times than others.',
    output: 'Type something on the left and watch it get just much more enough confused than usually.',
    leftLabel:  'English',
    rightLabel: 'Shoovlated',
  },
  reverse: {
    input:  'He has just done it many more enough times than others.',
    output: 'Paste shoovlated text on the left to translate it back to English (best guess).',
    leftLabel:  'Shoovlated',
    rightLabel: 'English (best guess)',
  },
};

function applyDirection() {
  document.body.classList.toggle('forward', direction === 'forward');
  document.body.classList.toggle('reverse', direction === 'reverse');
  const p = PLACEHOLDERS[direction];
  input.placeholder = p.input;
  output.dataset.placeholder = p.output;
  leftLabel.textContent  = p.leftLabel;
  rightLabel.textContent = p.rightLabel;
}

// Typewriter: progressively reveals the rendered HTML respecting tag
// boundaries (so <span class="changed"> is opened/closed correctly mid-stream).
let typewriterTimer = null;
function typewriter(targetEl, html, charsPerTick = 4, tickMs = 14) {
  if (typewriterTimer) { clearTimeout(typewriterTimer); typewriterTimer = null; }
  // Tokenise into a stream of either visible text-units or invisible HTML tags.
  const tokens = [];
  let p = 0;
  while (p < html.length) {
    const c = html[p];
    if (c === '<') {
      const end = html.indexOf('>', p);
      if (end === -1) { tokens.push({ vis: false, s: html.slice(p) }); break; }
      tokens.push({ vis: false, s: html.slice(p, end + 1) });
      p = end + 1;
    } else if (c === '&') {
      const semi = html.indexOf(';', p);
      if (semi !== -1 && semi - p <= 8) {
        tokens.push({ vis: true, s: html.slice(p, semi + 1) });
        p = semi + 1;
      } else {
        tokens.push({ vis: true, s: c });
        p++;
      }
    } else {
      tokens.push({ vis: true, s: c });
      p++;
    }
  }
  let pos = 0;
  function tick() {
    let revealed = 0;
    while (pos < tokens.length && revealed < charsPerTick) {
      if (tokens[pos].vis) revealed++;
      pos++;
    }
    // Also advance past trailing tags so we never end with a half-open span.
    while (pos < tokens.length && !tokens[pos].vis) pos++;
    let buf = '';
    for (let k = 0; k < pos; k++) buf += tokens[k].s;
    targetEl.innerHTML = buf;
    if (pos < tokens.length) {
      typewriterTimer = setTimeout(tick, tickMs);
    } else {
      typewriterTimer = null;
    }
  }
  tick();
}

function render(animate = false) {
  let html;
  if (direction === 'forward') {
    const i = +intensityEl.value / 100;
    html = renderMarked(shoovlate(input.value, i));
  } else {
    html = escapeHtml(deshoovlate(input.value));
  }
  if (animate && html.length > 0) {
    typewriter(output, html);
  } else {
    if (typewriterTimer) { clearTimeout(typewriterTimer); typewriterTimer = null; }
    output.innerHTML = html;
  }
}

function debouncedRender() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => render(false), 160);
}

input.addEventListener('input', debouncedRender);
intensityEl.addEventListener('input', () => {
  intensityLbl.textContent = `${intensityEl.value}%`;
  render();
});

clearBtn.addEventListener('click', () => {
  input.value = '';
  render();
  input.focus();
});

copyBtn.addEventListener('click', async () => {
  const txt = output.textContent || '';
  if (!txt.trim()) return;
  try {
    await navigator.clipboard.writeText(txt);
    const orig = copyBtn.textContent;
    copyBtn.textContent = 'Copied';
    setTimeout(() => { copyBtn.textContent = orig; }, 1200);
  } catch (e) {
    // clipboard unavailable; ignore silently
  }
});

rerollBtn.addEventListener('click', () => render(true));

swapBtn.addEventListener('click', () => {
  // Move current output to input so the round-trip is visible. If output is
  // empty (e.g. user hasn't typed yet), leave the input alone.
  const outText = (output.textContent || '').trim();
  if (outText) input.value = output.textContent;
  direction = direction === 'forward' ? 'reverse' : 'forward';
  applyDirection();
  render(true);
});

document.querySelectorAll('.examples button[data-ex]').forEach(b => {
  b.addEventListener('click', () => {
    input.value = b.dataset.ex;
    render(true);
    input.focus();
  });
});

// Save-as-image: render the current shoovlation to a 1200x630 PNG.
const saveBtn = document.getElementById('saveBtn');
let cachedMascotImg = null;

function loadMascot() {
  if (cachedMascotImg) return Promise.resolve(cachedMascotImg);
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => { cachedMascotImg = img; resolve(img); };
    img.onerror = reject;
    img.src = 'mascot-shoovy.png';
  });
}

function wrapTextLines(ctx, text, maxWidth) {
  const words = text.split(/\s+/).filter(Boolean);
  const lines = [];
  let line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = w;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

async function buildShareCanvas() {
  const text = (output.textContent || '').trim();
  if (!text) return null;

  const W = 1200, H = 630;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, W, H);

  // Mascot disc top-left (cover-fit, matches page header behaviour)
  const mascot = await loadMascot();
  const discSize = 96, discX = 60, discY = 56;
  ctx.save();
  ctx.beginPath();
  ctx.arc(discX + discSize / 2, discY + discSize / 2, discSize / 2, 0, Math.PI * 2);
  ctx.closePath();
  ctx.clip();
  ctx.fillStyle = '#ffd166';
  ctx.fillRect(discX, discY, discSize, discSize);
  const mw = mascot.naturalWidth, mh = mascot.naturalHeight;
  const scale = discSize / Math.min(mw, mh);
  const sw = mw * scale, sh = mh * scale;
  const sx = discX + (discSize - sw) / 2;
  const sy = discY + (discSize - sh) * 0.30;
  ctx.drawImage(mascot, sx, sy, sw, sh);
  ctx.restore();

  // Wordmark
  ctx.textBaseline = 'middle';
  const wordmarkY = discY + discSize / 2 + 2;
  const wordmarkX = discX + discSize + 22;
  ctx.font = '700 56px ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('Shoov', wordmarkX, wordmarkY);
  const shoovWidth = ctx.measureText('Shoov').width;
  ctx.fillStyle = '#ffd166';
  ctx.fillText('lator', wordmarkX + shoovWidth, wordmarkY);

  // Body text — Comic Sans gold, wrapped
  const bodyTop = 210, bodyBottom = H - 80, padX = 60;
  const maxWidth = W - 2 * padX;
  // Pick font size that comfortably fits — start at 56, shrink if too many lines
  let fontSize = 56;
  let lines;
  while (true) {
    ctx.font = `500 ${fontSize}px "Comic Sans MS", "Comic Sans", "Chalkboard SE", cursive`;
    lines = wrapTextLines(ctx, text, maxWidth);
    const needed = lines.length * (fontSize * 1.30);
    if (needed <= bodyBottom - bodyTop || fontSize <= 28) break;
    fontSize -= 4;
  }
  const lineHeight = fontSize * 1.30;
  const blockHeight = lines.length * lineHeight;
  let y = bodyTop + Math.max(0, ((bodyBottom - bodyTop) - blockHeight) / 2);
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#ffd166';
  for (const line of lines) {
    ctx.fillText(line, padX, y);
    y += lineHeight;
  }

  // Watermark
  ctx.fillStyle = '#777777';
  ctx.font = '400 22px ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('bookhockeys.com/shoovlator', padX, H - 32);

  return canvas;
}

saveBtn.addEventListener('click', async () => {
  const orig = saveBtn.textContent;
  saveBtn.textContent = '...';
  try {
    const canvas = await buildShareCanvas();
    if (!canvas) { saveBtn.textContent = orig; return; }
    canvas.toBlob(blob => {
      if (!blob) { saveBtn.textContent = orig; return; }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'shoovlation.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      saveBtn.textContent = 'Saved';
      setTimeout(() => { saveBtn.textContent = orig; }, 1200);
    }, 'image/png');
  } catch (e) {
    saveBtn.textContent = 'Failed';
    setTimeout(() => { saveBtn.textContent = orig; }, 1400);
  }
});

// Share-by-URL: reads `#text=...&dir=...` on load, builds the same on click.
function parseHash() {
  const h = window.location.hash.replace(/^#/, '');
  if (!h) return null;
  const p = new URLSearchParams(h);
  const text = p.get('text');
  if (text === null) return null;
  return { text, dir: p.get('dir') === 'reverse' ? 'reverse' : 'forward' };
}

shareBtn.addEventListener('click', async () => {
  const url = new URL(window.location.href);
  const p = new URLSearchParams();
  if (input.value) p.set('text', input.value);
  if (direction === 'reverse') p.set('dir', 'reverse');
  url.hash = p.toString();
  const link = url.toString();
  const orig = shareBtn.textContent;
  try {
    await navigator.clipboard.writeText(link);
    shareBtn.textContent = 'Link copied!';
  } catch (e) {
    shareBtn.textContent = 'Could not copy';
  }
  setTimeout(() => { shareBtn.textContent = orig; }, 1400);
});

intensityLbl.textContent = `${intensityEl.value}%`;

const hashState = parseHash();
if (hashState && hashState.text) {
  input.value = hashState.text;
  if (hashState.dir === 'reverse') direction = 'reverse';
}
applyDirection();
render(!!(hashState && hashState.text));
</script>
</body>
