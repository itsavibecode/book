<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ChordSwarm</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="icon" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta property="og:title" content="ChordSwarm — Guitar Hero for your Kick chat">
<meta property="og:description" content="A transparent OBS overlay: emoji chords fall, your chat swarms the match to land them. Beat-matches the music you play.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://bookhockeys.com/chordswarm/">
<meta property="og:image" content="https://bookhockeys.com/chordswarm/og.png">
<meta name="twitter:card" content="summary_large_image">
<!--
  ChordSwarm v0.9.1 - combo lightning bolt down the highway (gold on milestones/records)
  "Guitar Hero for Kick chat": emoji chords fall toward a strike line and chat
  swarms the matching emoji to land the note. Transparent OBS browser-source
  overlay, positionable to one side so the streamer stays visible.

  Reads live Kick chat over the Pusher websocket (?channel=). Music drives the
  beat grid: hosted files are analyzed in-browser; YouTube is played + its tempo
  looked up via chordswarm-worker (song-id -> GetSongBPM, cached).

  URL params:
    ?channel=<name>        live Kick chat for that channel (resolves chatroom id)
    ?chatroom=<id>         explicit chatroom id (skips resolution)
    ?sim=1                 simulated chat + dev test harness (feed + controls)
    ?pos=left|center|right overlay position (default left, least intrusive)
    ?difficulty=easy|normal|hard
    ?dev=1                 dark dev backdrop + harness (works with ?channel)
    ?bg=<url>              background video for dev/preview (default media/bg.mp4 in dev)
    ?bgzoom=<n>            zoom/crop the bg video, right-anchored (default 1.3)
    ?audio=test:128        synthetic click track at 128 BPM (no hosting needed)
    ?playlist=<json|urls>  play hosted tracks; chords land on detected beats
    ?yt=<id|url>           play a YouTube video; auto-tempo via the worker
    ?worker=<url>          override the BPM worker base URL
    ?bpm=<n>               manual tempo fallback (e.g. when lookup misses)
  See PLAN.md for the full design (Kick §5, audio/YouTube §6b).
-->
<style>
  :root{
    --accent:#7c5cff;       /* swarm purple */
    --good:#36e07a;
    --bad:#ff4d6d;
    --gold:#ffcf3a;
    --ink:#f3f0ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;color:var(--ink)}
  /* Transparent by default for OBS. Dev backdrop only when requested. */
  body{background:transparent}
  body.dev{background:radial-gradient(1200px 800px at 50% -10%, #241b46 0%, #120c24 55%, #0a0716 100%)}

  /* Dev-only background video (simulates a real stream behind the overlay).
     Never shown in a clean OBS load — only with ?sim=1 / ?dev=1 / ?bg=. */
  /* Background video. Zoomed + right-anchored so the left chat panel in the clip
     crops off-screen (tune with ?bgzoom=, default 1.3). */
  #bgvid{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;display:none;
         transform:scale(var(--bgzoom,1.3));transform-origin:100% 50%}
  #stage{position:fixed;inset:0;z-index:1}
  canvas{position:absolute;inset:0;width:100%;height:100%}

  /* ---- HUD (non-interactive) ---- */
  .hud{position:fixed;font-variant-numeric:tabular-nums;pointer-events:none;z-index:5;
       /* dark outline halo so the stats stay readable over the background video */
       text-shadow:0 0 3px #000, 0 0 3px #000, 0 1px 2px #000, 0 2px 8px rgba(0,0,0,.85);
       -webkit-text-stroke:0.4px rgba(0,0,0,.45)}
  #hud-band{top:14px;left:48px}
  .score{font-size:38px;font-weight:800;letter-spacing:.5px;line-height:1}
  .score small{font-size:15px;font-weight:600;opacity:.7;margin-left:6px}
  .combo{margin-top:5px;font-size:20px;font-weight:800}
  .combo b{color:var(--gold)}
  .hype-wrap{margin-top:9px;width:230px;height:11px;border-radius:8px;
             background:rgba(255,255,255,.12);overflow:hidden;
             box-shadow:inset 0 0 0 1px rgba(255,255,255,.15)}
  .hype-fill{height:100%;width:0;border-radius:8px;
             background:linear-gradient(90deg,var(--accent),#b69bff);
             transition:width .12s linear}
  .hype-wrap.full .hype-fill{background:linear-gradient(90deg,var(--gold),#fff0a8);
             box-shadow:0 0 16px var(--gold)}
  .hype-label{font-size:10px;letter-spacing:2px;font-weight:700;opacity:.7;margin-top:3px}
  .chatrate{margin-top:11px;font-size:19px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
  .chatrate b{color:var(--accent)}
  .chatrate b.uniq{color:var(--gold)}
  .chatrate small{display:block;font-size:9px;letter-spacing:1.5px;font-weight:700;opacity:.55;margin-top:3px}

  #hud-board{bottom:16px;left:48px;text-align:left;min-width:190px}
  .board-title{font-size:10px;letter-spacing:2px;font-weight:700;opacity:.6;margin-bottom:5px}
  .board-row{font-size:15px;font-weight:700;display:flex;gap:10px;line-height:1.5}
  .board-row .nm{opacity:.92;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .board-row .pt{color:var(--accent);font-weight:800}
  .board-row.mvp .pt{color:var(--gold)}

  /* Position variants: keep the HUD on the same side as the lane. */
  body.pos-right #hud-band{left:auto;right:48px;text-align:right}
  body.pos-right #hud-board{left:auto;right:48px;text-align:right}
  body.pos-right .board-row{justify-content:flex-end}
  body.pos-center #hud-band{left:22px}
  body.pos-center #hud-board{left:auto;right:22px;top:14px;bottom:auto;text-align:right}
  body.pos-center .board-row{justify-content:flex-end}

  #hint{position:fixed;bottom:10px;left:0;right:0;text-align:center;
        font-size:12px;opacity:.4;letter-spacing:1px;z-index:5}
  /* Now-playing panel — prominent, upper-center, so chat sees the current song. */
  #nowplaying{position:fixed;top:14px;left:50%;transform:translateX(-50%);max-width:48%;
        text-align:center;font-size:13.5px;font-weight:800;letter-spacing:.2px;color:var(--ink);
        background:rgba(10,7,22,.62);border:1px solid rgba(124,92,255,.5);border-radius:14px;
        padding:6px 16px;z-index:7;line-height:1.25;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,.45);
        display:none;-webkit-box-orient:vertical;-webkit-line-clamp:2}   /* wraps to max 2 lines */
  #nowplaying.show{display:-webkit-box}
  #connstate{position:fixed;top:54px;left:0;right:0;text-align:center;
        font-size:12px;font-weight:700;letter-spacing:1px;opacity:.75;z-index:6;display:none}
  /* YouTube player — upper-right corner (above where stream chat usually sits). */
  #ytwrap{position:fixed;display:none;z-index:4;width:240px;height:135px;top:14px;right:14px;
        border-radius:8px;overflow:hidden;box-shadow:0 6px 22px rgba(0,0,0,.5)}
  body.pos-right #ytwrap{right:auto;left:14px}   /* lane on the right -> player to the left */
  #ytwrap iframe{width:100%;height:100%;border:0}
  /* semver pill — bottom-right, clear of the HUD + YT player. */
  #ver-pill{position:fixed;bottom:18px;right:12px;z-index:6;font-size:10px;font-weight:800;
        letter-spacing:.5px;padding:2px 8px;border-radius:999px;opacity:.7;
        background:rgba(124,92,255,.22);border:1px solid rgba(124,92,255,.45);
        color:var(--ink);font-variant-numeric:tabular-nums;text-shadow:0 1px 4px rgba(0,0,0,.6)}
  /* DEMO badge — makes clear the sim is a demo (simulated chat), not a live stream. */
  #demo-badge{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:8;display:none;
        font-size:13px;font-weight:900;letter-spacing:3px;color:#1a1330;background:var(--gold);
        border-radius:999px;padding:5px 16px;box-shadow:0 4px 16px rgba(255,207,58,.4)}
  body.sim #demo-badge{display:block}
  body.sim #nowplaying{top:48px}                 /* sit below the DEMO badge */
  /* getsongbpm.com backlink — REQUIRED by their free API, always visible. */
  /* centered blinking Play button — nothing starts until it's pressed (demo/sim) */
  #play-btn{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9;display:none;
        pointer-events:auto;cursor:pointer;font-family:inherit;font-size:30px;font-weight:900;
        letter-spacing:3px;color:#fff;background:rgba(124,92,255,.92);border:3px solid #fff;
        border-radius:18px;padding:22px 52px;box-shadow:0 10px 36px rgba(0,0,0,.55);
        animation:playpulse 1.05s ease-in-out infinite}
  #play-btn:hover{background:rgba(124,92,255,1)}
  @keyframes playpulse{
    0%,100%{ box-shadow:0 10px 30px rgba(124,92,255,.45); transform:translate(-50%,-50%) scale(1); }
    50%    { box-shadow:0 10px 50px rgba(124,92,255,.95); transform:translate(-50%,-50%) scale(1.07); } }
  #gsbpm-credit{position:fixed;bottom:3px;right:8px;font-size:10px;opacity:.55;z-index:6;
        color:var(--ink);text-decoration:none}
  #gsbpm-credit:hover{opacity:.85;text-decoration:underline}

  /* ===== DEV TEST HARNESS (only with ?sim=1 / ?dev=1) ===== */
  #chatfeed{position:fixed;display:none;width:280px;top:120px;bottom:96px;
            right:22px;overflow:hidden;z-index:6;pointer-events:none;
            -webkit-mask-image:linear-gradient(180deg,transparent,#000 18%);
            mask-image:linear-gradient(180deg,transparent,#000 18%)}
  body.harness #chatfeed{display:flex;flex-direction:column;justify-content:flex-end}
  /* keep the feed on the opposite side of the lane */
  body.pos-right #chatfeed{right:auto;left:22px}
  .fmsg{font-size:13px;line-height:1.55;opacity:.85;text-shadow:0 1px 4px rgba(0,0,0,.7);
        white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fmsg .fu{font-weight:700;color:#b69bff}
  .fmsg.hit{opacity:1}
  .fmsg.hit .fu{color:var(--good)}

  #simctl{position:fixed;left:0;right:0;bottom:0;display:none;z-index:7;
          align-items:center;gap:10px;flex-wrap:wrap;padding:8px 14px;
          background:rgba(10,7,22,.82);border-top:1px solid rgba(124,92,255,.3);
          backdrop-filter:blur(6px);pointer-events:auto;font-size:12px}
  body.harness #simctl{display:flex}
  #simctl .grp{display:flex;align-items:center;gap:6px}
  #simctl .sep{width:1px;height:22px;background:rgba(255,255,255,.15)}
  #simctl label{opacity:.7;font-weight:600}
  #simctl button{font:inherit;font-weight:700;color:var(--ink);cursor:pointer;
          background:rgba(124,92,255,.22);border:1px solid rgba(124,92,255,.45);
          border-radius:7px;padding:5px 9px;line-height:1}
  #simctl button:hover{background:rgba(124,92,255,.4)}
  #simctl button.emoji{font-size:17px;padding:3px 8px}
  #simctl button.toggle.off{background:rgba(255,77,109,.18);border-color:rgba(255,77,109,.5)}
  #simctl input[type=range]{width:90px;accent-color:var(--accent)}
  #simctl input[type=text]{font:inherit;color:var(--ink);background:rgba(255,255,255,.08);
          border:1px solid rgba(255,255,255,.2);border-radius:7px;padding:5px 8px;width:150px}
  #simctl .val{font-weight:800;color:var(--accent);min-width:30px;text-align:right}
  #simctl .status{font-weight:700;letter-spacing:1px;opacity:.8}
</style>
</head>
<body>
  <video id="bgvid" muted loop playsinline></video>
  <div id="stage"><canvas id="cv"></canvas></div>
  <button id="play-btn">&#9658;&nbsp;PLAY</button>

  <div class="hud" id="hud-band">
    <div class="score" id="score">0<small>pts</small></div>
    <div class="combo" id="combo">&nbsp;</div>
    <div class="hype-wrap" id="hype-wrap"><div class="hype-fill" id="hype-fill"></div></div>
    <div class="hype-label" id="hype-label">HYPE</div>
    <div class="chatrate" id="chatrate"><b>0</b> / <b class="uniq">0</b><small>MSGS / UNIQUE PER MIN</small></div>
  </div>

  <div class="hud" id="hud-board">
    <div class="board-title">SWARM MVPs</div>
    <div id="board"></div>
  </div>

  <div id="chatfeed"></div>
  <div id="ver-pill"></div>
  <div id="demo-badge">DEMO</div>
  <div id="connstate"></div>
  <div id="nowplaying"></div>
  <div id="ytwrap"><div id="ytplayer"></div></div>
  <a id="gsbpm-credit" href="https://getsongbpm.com" target="_blank" rel="noopener">BPM data: getsongbpm.com</a>
  <div id="hint"></div>

  <!-- Dev test harness control strip -->
  <div id="simctl">
    <span class="status" id="ctl-status">SIM</span>
    <div class="sep"></div>
    <button class="toggle" id="ctl-bots">Bots: ON</button>
    <div class="grp"><label>chatters</label><input type="range" id="ctl-count" min="0" max="200" value="42"><span class="val" id="ctl-count-v">42</span></div>
    <div class="grp"><label>eager</label><input type="range" id="ctl-eager" min="0" max="200" value="100"><span class="val" id="ctl-eager-v">100%</span></div>
    <div class="sep"></div>
    <div class="grp" id="ctl-emojis"></div>
    <button id="ctl-swarm">Swarm this note</button>
    <div class="sep"></div>
    <input type="text" id="ctl-msg" placeholder="type as YOU + Enter">
    <div class="grp" id="ctl-audio" style="display:none">
      <div class="sep"></div>
      <button id="ctl-play">Play</button>
      <button id="ctl-skip">Skip</button>
    </div>
  </div>

<script>
"use strict";
/* ============================================================ CONFIG ===== */
const qs = new URLSearchParams(location.search);
const SIM = qs.get('sim') === '1';
const DEV = qs.get('dev') === '1' || SIM;        // dark backdrop for local viewing
const HARNESS = DEV;                              // chat feed + control strip
const POS = ['left','center','right'].includes(qs.get('pos')) ? qs.get('pos') : 'left';
const AUDIO = qs.get('audio') || '';          // '', 'test', 'test:128'
const PLAYLIST = qs.get('playlist') || '';    // json url or comma list
const CHANNEL = (qs.get('channel') || '').trim().toLowerCase();   // kick channel slug
const CHATROOM = (qs.get('chatroom') || '').trim();               // explicit chatroom id
const YT_SRC = (qs.get('yt') || '').trim();                       // youtube id or url (auto-tempo). NOT named YT — that global belongs to the YouTube IFrame API!
const WORKER_URL = (qs.get('worker') || 'https://chordswarm-worker.sevendwarfs.workers.dev').replace(/\/+$/,'');
const AUDIO_MODE = !!(AUDIO || PLAYLIST || YT_SRC);
const VERSION = '0.9.1';                      // single source of truth — bump here
const BG = qs.get('bg') || (DEV ? 'media/bg.mp4' : '');   // dev background video (muted, loop)
const BGZOOM = +qs.get('bgzoom') || 1.3;                  // zoom/crop the bg (right-anchored) to hide left chat

if (DEV) document.body.classList.add('dev');
if (HARNESS) document.body.classList.add('harness');
if (SIM) document.body.classList.add('sim');     // shows the DEMO badge
document.body.classList.add('pos-' + POS);

const DIFFS = {
  easy:   { lead:2900, half:520, P:0.12, minHit:2, maxHit:18, spacing:1700 },
  normal: { lead:2500, half:440, P:0.15, minHit:2, maxHit:26, spacing:1350 },
  hard:   { lead:2100, half:360, P:0.18, minHit:3, maxHit:40, spacing:1050 },
};
const DIFF = DIFFS[qs.get('difficulty')] || DIFFS.normal;

// Curated v1 chord vocabulary (Unicode emoji, universally typable).
const CHORDS = ['🔥','💀','😂','❤️','👏','🎉','🚀','🤡'];

// Emote / shortcode stripping (reused pattern from kekw) so a chatter typing
// "lol 🔥🔥" still counts and Kick emote tokens don't pollute matching later.
const stripTokens = s => s.replace(/\[emote:[^\]]+\]/gi,'').replace(/:[a-zA-Z0-9_]+:/g,'');
function messageHits(text, emoji){ return stripTokens(text).includes(emoji); }

/* ===================================================== ACTIVE-CHATTER ==== */
/* Rolling set of users seen in the last N seconds -> dynamic hit threshold. */
const ACTIVE_WINDOW_MS = 12000;
let activeSeen = [];               // [{user, ts}]
function noteActivity(user, now){ activeSeen.push({user, ts:now}); }
function activeChatterCount(now){
  while (activeSeen.length && activeSeen[0].ts < now - ACTIVE_WINDOW_MS) activeSeen.shift();
  return new Set(activeSeen.map(a => a.user)).size;
}
function thresholdFor(now){
  const active = activeChatterCount(now);
  return Math.min(DIFF.maxHit, Math.max(DIFF.minHit, Math.ceil(active * DIFF.P)));
}

/* ============================================================ SCORE ====== */
const score = {
  band:0, combo:0, best:0, mult:1, hype:0,            // band layer
  users:new Map(),                                    // individual layer: user -> {pts,hits}
};
function multiplier(combo){ return combo>=30?4 : combo>=20?3 : combo>=10?2 : 1; }
function creditUser(user, pts){
  const u = score.users.get(user) || {pts:0, hits:0};
  u.pts += pts; u.hits += 1; score.users.set(user, u);
}
let hitFx = 0, recordFx = 0, bolt = null;   // purple hit glow + gold record flash + lightning bolt
function registerHit(note){
  const prevBest = score.best, prevMult = score.mult;
  score.combo += 1;
  const isRecord = score.combo > prevBest && score.combo >= 10;   // new all-time-high combo
  score.best = Math.max(score.best, score.combo);
  score.mult = multiplier(score.combo);
  const milestone = score.mult > prevMult;                        // crossed x2/x3/x4
  const base = 100 * (note.emojis.length > 1 ? 1.6 : 1);   // doubles are worth more
  score.band += Math.round(base * score.mult);
  const all = noteMatchers(note);
  const per = Math.max(10, Math.round((base*score.mult)/Math.max(1, all.size)));
  all.forEach(u => creditUser(u, per));
  score.hype = Math.min(1, score.hype + 0.045);   // ebbs via passive decay in frame()
  hitFx = Math.min(1, 0.4 + score.combo*0.025);   // brighter glow with a higher combo
  if (isRecord) recordFx = 1;                      // gold burst on a new record
  // lightning down the highway on the bigger ones (and milestones / records)
  if (score.combo >= 8 || milestone || isRecord)
    fireBolt(Math.min(1, 0.45 + score.combo*0.02), isRecord || milestone);
}
function registerMiss(){
  score.combo = 0; score.mult = 1;
  score.hype = Math.max(0, score.hype - 0.25);
}

/* ============================================================ CHART ====== */
let songStart = 0, chartIdx = 0;
const notes = [];
let lastEmoji = null;
function pickEmoji(){
  let e; do { e = CHORDS[(Math.random()*CHORDS.length)|0]; } while (e===lastEmoji && CHORDS.length>1);
  return lastEmoji = e;
}
// A note carries 1 emoji normally, or occasionally 2 side-by-side (a "double"
// curveball that splits chat). hits[] is one matcher-Set per emoji.
const DOUBLE_CHANCE = 0.13;       // ~1 in 8 notes is a double (never two in a row)
let lastWasDouble = false;
function makeNote(targetTime){
  const a = pickEmoji();
  let emojis = [a];
  if (!lastWasDouble && CHORDS.length > 1 && Math.random() < DOUBLE_CHANCE){
    let b; do { b = CHORDS[(Math.random()*CHORDS.length)|0]; } while (b === a);
    emojis = [a, b]; lastWasDouble = true;
  } else lastWasDouble = false;
  lastEmoji = emojis[emojis.length-1];
  return { emojis, targetTime, hits: emojis.map(()=>new Set()), state:'falling' };
}
function noteReq(thr, note){ return note.emojis.length > 1 ? Math.max(DIFF.minHit, Math.ceil(thr*0.6)) : thr; }
function noteIsHit(note, thr){ const r = noteReq(thr, note); return note.hits.every(s => s.size >= r); }
function noteMatchers(note){ const all = new Set(); note.hits.forEach(s => s.forEach(u => all.add(u))); return all; }
function ensureNotes(now){
  const horizon = now + DIFF.lead + 600;
  // if we were just in audio mode (or paused), skip the chart ahead instead of
  // spawning a catch-up burst.
  const minStart = now - DIFF.spacing;
  if (songStart + chartIdx*DIFF.spacing < minStart)
    chartIdx = Math.ceil((minStart - songStart)/DIFF.spacing);
  while (songStart + chartIdx*DIFF.spacing < horizon){
    const targetTime = songStart + chartIdx*DIFF.spacing + DIFF.lead;
    notes.push(makeNote(targetTime));
    chartIdx++;
  }
}
function liveNote(now){
  return notes.find(n => n.state==='falling' && Math.abs(now - n.targetTime) <= DIFF.half);
}

/* ========================================================= CHAT SOURCE === */
/* Interface: source.onMessage(fn) where fn(text, sender:{username}).
   simCfg is read live so the dev control strip can retune the sim on the fly. */
const simCfg = { bots:true, count:42, eagerMult:1.0 };
function SimSource(){
  const MAXU = 200;
  const adj = ['cozy','spicy','mega','tiny','lucky','grim','wild','chill','salty','hyper','zappy','noble'];
  const noun = ['otter','goblin','ninja','toast','pixel','comet','waffle','raven','cactus','yeti','panda','drake'];
  const users = Array.from({length:MAXU}, (_,i)=>({
    name: `${adj[i%adj.length]}_${noun[(i*7)%noun.length]}${i}`,
    eager: 0.4 + Math.random()*0.55,
    rate:  0.15 + Math.random()*0.5,
  }));
  let cb = ()=>{};
  const filler = ['hi','lol','LETS GO','gg','o7','what song','+2','nice','sheesh','W','pog'];
  function tick(now){
    if (!simCfg.bots) return;
    const near = notes.find(n => n.state==='falling' && Math.abs(now - n.targetTime) <= DIFF.half*1.4);
    const n = Math.min(users.length, simCfg.count);
    for (let i=0;i<n;i++){
      const u = users[i];
      if (near && Math.random() < u.eager*0.6*simCfg.eagerMult){
        const em = near.emojis[(Math.random()*near.emojis.length)|0];   // split across a double
        cb(em + (Math.random()<0.3?' '+em:''), {username:u.name});
        continue;
      }
      if (Math.random() < u.rate*0.18){
        const r = Math.random();
        const txt = r<0.5 ? CHORDS[(Math.random()*CHORDS.length)|0]
                          : filler[(Math.random()*filler.length)|0];
        cb(txt, {username:u.name});
      }
    }
  }
  return { onMessage:fn=>{cb=fn;}, tick };
}

/* Real Kick chat over the Pusher websocket — connection/resolution/parsing
   lifted from the kekw repo (battle-tested). Routes into ingest() behind the
   same onMessage interface as SimSource. Read-only: we subscribe to chat and
   never send. */
function KickPusherSource(opts){
  const KEYS = ['32cbd69e4b950bf97679','eb1d5f283081a78b932c'];  // public Pusher keys, failover
  let cb = ()=>{}, ws=null, pingTimer=null, keyIdx=0, connected=false, stopped=false;
  let roomId = opts.chatroom || null;

  // username -> chatroom id via public CORS proxies (kick.com API is CF-protected).
  // (A resolver Worker on sevendwarfs is the planned robustness upgrade.)
  async function resolveRoom(slug){
    const apiUrl = 'https://kick.com/api/v2/channels/' + slug;
    const enc = encodeURIComponent(apiUrl);
    const proxies = [
      `https://api.allorigins.win/get?url=${enc}`,
      `https://api.codetabs.com/v1/proxy?quest=${apiUrl}`,
      `https://thingproxy.freeboard.io/fetch/${apiUrl}`,
      `https://corsproxy.io/?${enc}`,
    ].sort(()=>Math.random()-0.5);
    for (const url of proxies){
      try{
        const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
        if (!res.ok) continue;
        const wrapper = await res.json();
        const raw = wrapper.contents!==undefined ? wrapper.contents : JSON.stringify(wrapper);
        const data = typeof raw==='string' ? JSON.parse(raw) : raw;
        if (data && data.chatroom && data.chatroom.id) return data.chatroom.id;
      }catch{ continue; }
    }
    return null;
  }

  function tryWS(){
    if (stopped) return;
    if (keyIdx >= KEYS.length){ setConn('failed'); return; }
    const url = `wss://ws-us2.pusher.com/app/${KEYS[keyIdx]}?protocol=7&client=js&version=8.3.0&flash=false`;
    if (ws){ try{ ws.close(); }catch{} }
    ws = new WebSocket(url);
    const to = setTimeout(()=>{ if (!connected){ try{ ws.close(); }catch{} keyIdx++; tryWS(); } }, 7000);
    ws.onopen = ()=> ws.send(JSON.stringify({ event:'pusher:subscribe', data:{ auth:'', channel:`chatrooms.${roomId}.v2` } }));
    ws.onmessage = raw=>{
      let m; try{ m = JSON.parse(raw.data); }catch{ return; }
      if (m.event === 'pusher:connection_established'){
        clearTimeout(to); connected = true; setConn('live');
        pingTimer = setInterval(()=>{ if (ws && ws.readyState===1) ws.send(JSON.stringify({ event:'pusher:ping', data:{} })); }, 30000);
        return;
      }
      // Kick sends both event names depending on context
      if (m.event === 'App\\Events\\ChatMessageEvent' || m.event === 'App\\Events\\ChatMessageSentEvent'){
        try{
          const d = typeof m.data==='string' ? JSON.parse(m.data) : m.data;
          const content = d.content || (d.message && (d.message.content || d.message.message)) || '';
          const sender = d.sender || d.user || {};
          const badges = (sender.identity && sender.identity.badges) || sender.badges || [];
          const priv = badges.some(b => ['broadcaster','moderator','staff','owner'].includes(b && b.type)) || sender.is_moderator === true;
          if (content) cb(content, { username: sender.username || sender.slug || '', priv });
        }catch{}
      }
    };
    ws.onerror = ()=>{ clearTimeout(to); if (!connected){ keyIdx++; tryWS(); } };
    ws.onclose = ()=>{
      clearTimeout(to); clearInterval(pingTimer);
      if (connected && !stopped){ connected = false; setConn('reconnecting'); keyIdx = 0; setTimeout(tryWS, 1500); }
    };
  }

  async function start(){
    setConn('looking up');
    if (!roomId && opts.channel) roomId = await resolveRoom(opts.channel);
    if (!roomId){ setConn('not found'); return; }
    setConn('connecting'); keyIdx = 0; tryWS();
  }
  return { onMessage:fn=>{ cb=fn; }, start, stop:()=>{ stopped=true; try{ ws && ws.close(); }catch{} clearInterval(pingTimer); } };
}

/* ============================================== AUDIO-REACTIVE (§6b) ===== */
/* The overlay owns + plays the music, analyzes the track OFFLINE up front for a
   beat grid, then drops chords on a slow subdivision so each crosses the strike
   line on the beat. ?playlist= for real tracks; ?audio=test:<bpm> for a built-in
   synthetic click track (no hosting / autoplay needed). */
let audioCtx = null, audioSrc = null;
let audioGrid = null;              // { bpm, beatMs, firstBeatMs }
let audioSub = 4;                  // notes every Nth beat (kept >= ~1.5s apart)
let audioActive = false;
let audioClockMode = 'none';       // 'buffer' = real playback | 'game' = silent test
let audioT0 = 0;                   // start ref (audioCtx secs, or clock() ms)
let beatCursor = 0;
let nowPlaying = '';
let playlist = [], plIdx = 0;

function ensureCtx(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function audioPosMs(){
  if (audioClockMode==='buffer' && audioCtx) return (audioCtx.currentTime - audioT0)*1000;
  if (audioClockMode==='game') return clock() - audioT0;
  if (audioClockMode==='yt' && ytPlayer && ytPlayer.getCurrentTime) return ytPlayer.getCurrentTime()*1000;
  return 0;
}

/* Offline tempo/beat detection: energy-flux onset envelope + autocorrelation. */
function analyzeAudioBuffer(buf){
  const sr = buf.sampleRate;
  const ch0 = buf.getChannelData(0);
  const ch1 = buf.numberOfChannels>1 ? buf.getChannelData(1) : null;
  const hop = Math.max(1, Math.round(sr*0.01));        // ~10ms frames
  const frames = Math.floor(ch0.length/hop);
  if (frames < 16) return null;
  const env = new Float32Array(frames);
  for (let f=0; f<frames; f++){
    let e=0; const s0=f*hop;
    for (let i=0;i<hop;i++){ const s = ch1 ? (ch0[s0+i]+ch1[s0+i])*0.5 : ch0[s0+i]; e += s*s; }
    env[f] = e;
  }
  const flux = new Float32Array(frames);
  for (let f=1; f<frames; f++){ const d = env[f]-env[f-1]; flux[f] = d>0 ? d : 0; }
  const fps = sr/hop;
  const minLag = Math.max(2, Math.round(fps*60/180));  // up to 180 BPM
  const maxLag = Math.round(fps*60/70);                // down to 70 BPM
  let bestLag=minLag, bestVal=-1;
  for (let lag=minLag; lag<=maxLag; lag++){
    let sum=0;
    for (let f=lag; f<frames; f++) sum += flux[f]*flux[f-lag];
    if (sum>bestVal){ bestVal=sum; bestLag=lag; }
  }
  let bestOff=0, offVal=-1;                             // beat phase
  for (let off=0; off<bestLag; off++){
    let sum=0; for (let f=off; f<frames; f+=bestLag) sum += flux[f];
    if (sum>offVal){ offVal=sum; bestOff=off; }
  }
  const bpm = 60*fps/bestLag;
  return { bpm, beatMs: 60000/bpm, firstBeatMs: bestOff*1000/fps };
}
function setGrid(grid){
  audioGrid = grid;
  audioSub = Math.max(1, Math.ceil(1500/grid.beatMs));  // keep notes ~>=1.5s apart
  beatCursor = 0;
}
function ensureNotesAudio(now){
  if (!audioGrid) return;
  const pos = audioPosMs();
  const horizon = pos + DIFF.lead + 200;
  while (true){
    const beatTime = audioGrid.firstBeatMs + beatCursor*audioGrid.beatMs;
    if (beatTime > horizon) break;
    if (beatCursor % audioSub === 0 && beatTime >= pos - 60){
      notes.push(makeNote(now + (beatTime - pos)));
    }
    beatCursor++;
  }
}

/* Synthetic click track (no file, no autoplay) — verifies the analyzer + lets
   you SEE the beat-aligned drop immediately. */
async function genClickTrack(bpm, secs){
  const sr=44100, OAC = window.OfflineAudioContext||window.webkitOfflineAudioContext;
  const oac = new OAC(1, Math.round(sr*secs), sr);
  const beat = 60/bpm;
  for (let t=0; t<secs; t+=beat){
    const o=oac.createOscillator(), g=oac.createGain();
    o.frequency.value=1200; o.connect(g); g.connect(oac.destination);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.9, t+0.002);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.05);
    o.start(t); o.stop(t+0.06);
  }
  return await oac.startRendering();
}
async function startTestAudio(bpm){
  const buf = await genClickTrack(bpm, 12);
  const grid = analyzeAudioBuffer(buf) || { bpm, beatMs:60000/bpm, firstBeatMs:0 };
  setGrid(grid);
  audioClockMode = 'game'; audioT0 = clock(); audioActive = true;   // silent, game-clock driven
  nowPlaying = `test ${grid.bpm.toFixed(1)} BPM · note every ${audioSub} beats`;
  updateNowPlaying();
}

async function loadPlaylist(spec){
  try{
    if (/\.json($|\?)/i.test(spec)){
      const j = await (await fetch(spec)).json();
      return Array.isArray(j) ? j : (j.tracks||[]);
    }
    return spec.split(',').map(u=>({url:u.trim()})).filter(t=>t.url);
  }catch(e){ console.warn('playlist load failed', e); return []; }
}
async function playTrack(i){
  if (!playlist.length) return;
  plIdx = ((i % playlist.length)+playlist.length)%playlist.length;
  const t = playlist[plIdx];
  try{
    const ctx = ensureCtx();
    const ab = await (await fetch(t.url)).arrayBuffer();
    const buf = await ctx.decodeAudioData(ab);
    const grid = analyzeAudioBuffer(buf);
    if (!grid) throw new Error('analysis failed');
    setGrid(grid);
    if (audioSrc) try{ audioSrc.stop(); }catch{}
    audioSrc = ctx.createBufferSource();
    audioSrc.buffer = buf; audioSrc.connect(ctx.destination);
    audioSrc.onended = ()=>{ if (audioActive && audioClockMode==='buffer') playTrack(plIdx+1); };
    audioClockMode = 'buffer'; audioT0 = ctx.currentTime; beatCursor = 0;
    audioSrc.start(); audioActive = true;
    nowPlaying = (t.title || t.url.split('/').pop()) + `  ·  ${grid.bpm.toFixed(0)} BPM`;
    updateNowPlaying();
  }catch(e){
    console.warn('playTrack failed (CORS / decode / autoplay?)', e);
    audioActive = false;                       // fall back to the fixed chart
  }
}
function updateNowPlaying(){
  const e = el('nowplaying'); if (!e) return;
  e.textContent = nowPlaying ? '♪ ' + nowPlaying : '';
  e.classList.toggle('show', !!nowPlaying);
}

/* --- YouTube source: play the embed + auto-tempo from chordswarm-worker.
   YouTube audio is unreachable for analysis, so BPM comes from the worker
   (song-id -> GetSongBPM); the IFrame's getCurrentTime() is the beat clock.
   Tempo only (no phase). Falls back to ?bpm=, then the fixed chart. */
let ytPlayer = null, ytReady = false, wantPlay = false;
// Shared "user wants playback now" entry — used by the click-to-start prompt AND
// the harness Play button. Handles the readiness race (a click before the YT
// player is ready is remembered and honored on ready) and resumes the AudioCtx
// for playlist mode.
function userStart(){
  if (YT_SRC){
    if (ytReady && ytPlayer && ytPlayer.playVideo){ try{ ytPlayer.unMute && ytPlayer.unMute(); ytPlayer.playVideo(); }catch{} }
    else wantPlay = true;            // not ready yet -> play as soon as onReady fires
  } else {
    try{ if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }catch{}
    if (PLAYLIST) playTrack(plIdx);
  }
}
function ytId(input){
  if (!input) return '';
  if (/^[A-Za-z0-9_-]{11}$/.test(input)) return input;
  try{
    const u = new URL(input);
    if (u.hostname.includes('youtu.be')){ const id=u.pathname.slice(1,12); if (/^[A-Za-z0-9_-]{11}$/.test(id)) return id; }
    const v = u.searchParams.get('v'); if (v && /^[A-Za-z0-9_-]{11}$/.test(v)) return v;
    const m = u.pathname.match(/\/(embed|shorts)\/([A-Za-z0-9_-]{11})/); if (m) return m[2];
  }catch{}
  const m = String(input).match(/[A-Za-z0-9_-]{11}/); return m ? m[0] : '';
}
function startYouTube(){ playYouTubeId(ytId(YT_SRC)); }
// Create the player on the given id, or swap the track in the existing one
// (used by ?yt= at boot AND by the live "!song" chat command).
function playYouTubeId(id){
  if (!id){ setConn('bad yt id'); return; }
  el('ytwrap').style.display = 'block';
  el('gsbpm-credit').style.display = 'block';   // getsongbpm.com attribution (required)
  if (ytPlayer && ytPlayer.loadVideoById){      // swap song live, no reload
    try{ ytPlayer.loadVideoById(id); ytPlayer.unMute && ytPlayer.unMute(); }catch{}
    resolveYtBpm(id); return;
  }
  const make = ()=>{
    ytPlayer = new YT.Player('ytplayer', {
      videoId: id,
      playerVars: { autoplay:1, controls:0, playsinline:1, modestbranding:1, rel:0 },
      events: {
        onReady: e => {
          ytReady = true;
          try{ e.target.playVideo(); }catch{}      // autoplay attempt (works in OBS)
          if (wantPlay){ try{ e.target.unMute && e.target.unMute(); e.target.playVideo(); }catch{} }
          resolveYtBpm(id);
        },
      },
    });
  };
  if (window.YT && window.YT.Player) make();
  else {
    window.onYouTubeIframeAPIReady = make;
    const s = document.createElement('script'); s.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(s);
  }
}
async function resolveYtBpm(id){
  let bpm = null, label = '';
  try{
    const d = await (await fetch(`${WORKER_URL}/bpm?v=${id}`)).json();
    if (d && d.ok && d.bpm){ bpm = d.bpm; const cached = d.cache || (d.source||'').includes('cache');
      label = `${d.title || 'track'} · ${d.bpm} BPM${cached?' (cached)':''}`; }
    else label = `${(d && d.title) ? d.title+' · ' : ''}tempo unknown`;
  }catch{ label = 'tempo lookup failed'; }
  const manual = +qs.get('bpm') || 0;
  const useBpm = bpm || manual || 0;
  if (useBpm){
    setGrid({ bpm: useBpm, beatMs: 60000/useBpm, firstBeatMs: 0 });   // tempo only, phase=0
    audioClockMode = 'yt'; audioActive = true; beatCursor = 0;
    nowPlaying = label + (bpm ? '' : ` · using ${useBpm} BPM`);
  } else {
    audioActive = false;                       // no tempo -> fixed chart, video still plays
    nowPlaying = label + ' · fixed pace';
  }
  updateNowPlaying();
}

/* Nothing runs until the user presses Play (browsers also block autoplay-with-
   sound until a gesture). The centered blinking Play button — or a click anywhere
   — starts the music, chat, emojis AND background video together. */
let started = false, pendingKickStart = false, _startGesture = null;
const NEEDS_PLAY = HARNESS || AUDIO_MODE;     // demo/sim or music -> wait for Play; pure live overlay auto-starts
function showPlay(){ const b = el('play-btn'); if (b) b.style.display = 'block'; }
function hidePlay(){ const b = el('play-btn'); if (b) b.style.display = 'none'; }
function startGame(){

  started = true; hidePlay();
  if (_startGesture){ document.removeEventListener('pointerdown', _startGesture); _startGesture = null; }
  songStart = clock() + 800; chartIdx = 0; lastSimTick = clock();   // notes begin fresh on Play

/* Kick connection status -> small indicator + harness label. */
let connState = '';
function setConn(s){

  const label = CHANNEL ? CHANNEL : ('room ' + CHATROOM);
  const dot = s==='live' ? '🟢' : s==='failed'||s==='not found' ? '🔴' : '🟡';

/* ============================================ INGEST + NOTE MATCHING ===== */
/* Single entry point for every message (sim bot, manual tester, or real Kick).
   Updates note matchers AND the visible dev chat feed. */
const feedMsgs = [];          // {u, t, hit}
let feedDirty = false;
const msgWin = [];            // {u, ts} over the last 60s -> chat rate readout
function ingest(text, sender){
  const user = sender && sender.username;
  if (!user) return;
  // Live song control from the broadcaster/mods (or YOU/sim for testing): a
  // "!song <youtube link>" message swaps the track with no OBS edit.
  const cmd = text.match(/^\s*!(?:song|play|yt)\s+(\S+)/i);
  if (cmd && (sender.priv || HARNESS || user === 'YOU')){
    const id = ytId(cmd[1]);
    if (id){ if (!started) startGame(); wantPlay = true; playYouTubeId(id); }
    return;                               // consume the command — not a chord
  }
  const now = clock();
  msgWin.push({u:user, ts:now});
  // did this message land inside a live note's window?
  let hit = false;
  for (const note of notes){
    if (note.state==='falling' && Math.abs(now - note.targetTime) <= DIFF.half && note.emojis.some(em=>messageHits(text, em))){ hit = true; break; }
  }
  applyMatch(text, sender, now);
  if (HARNESS){
    feedMsgs.push({u:user, t:text, hit});
    if (feedMsgs.length > 60) feedMsgs.shift();
    feedDirty = true;
  }
}
function applyMatch(text, sender, now){
  const user = sender.username;
  noteActivity(user, now);
  for (const note of notes){
    if (note.state!=='falling') continue;
    if (Math.abs(now - note.targetTime) <= DIFF.half){
      let any = false;
      note.emojis.forEach((em,i)=>{ if (messageHits(text, em)){ note.hits[i].add(user); any = true; } });
      if (any) break;                     // one note per message (single lane)
    }
  }
}

/* ============================================================ RESOLVE ==== */
const popups = [];
function resolveNotes(now){
  const thr = thresholdFor(now);
  for (const note of notes){
    if (note.state!=='falling') continue;
    const past = now > note.targetTime + DIFF.half;
    const isHit = noteIsHit(note, thr);
    const smashed = isHit && now >= note.targetTime - DIFF.half*0.3;
    if (smashed || past){
      note.required = noteReq(thr, note);
      if (isHit){
        note.state = 'hit'; registerHit(note);
        popups.push(mkPopup(note, true));
      } else {
        note.state = 'miss'; registerMiss();
        popups.push(mkPopup(note, false));
      }
      note.resolvedAt = now;
    }
  }
  for (let i=notes.length-1;i>=0;i--){
    if (notes[i].state!=='falling' && now > notes[i].resolvedAt + 700) notes.splice(i,1);
  }
}
function mkPopup(note, good){
  return { good, born:clock(), label: good ? `+${noteMatchers(note).size}` : 'MISS' };
}

/* ============================================================ RENDER ===== */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W=0,H=0,DPR=1, laneX=0, laneW=0, strikeY=0, laneTopY=0;
// Perspective highway (Guitar-Hero style): a trapezoid receding to a vanishing
// point at the top; notes start tiny in the distance and rush AT the viewer
// (growing + accelerating) as they approach and pass the strike line. Screen
// position + size both scale by 1/depth.
const PERSP_RATIO = 7.5;          // far-depth / near-depth (higher = stronger perspective)
const HW_TOP_FRAC = 0.09;         // far (top) width as a fraction of near (bottom) width
const NOTE_SIZE   = 120;          // emoji px at the strike line (scales by 1/depth up the highway)
const DNEAR = 1, DFAR = PERSP_RATIO;
let centerX=0, yFar=0, yNear=0, hwTop=0, hwBot=0, Kp=0, yHorizon=0;

function resize(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  W = cv.clientWidth; H = cv.clientHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);

  const margin = 48;
  laneW = POS==='center' ? Math.min(360, W*0.5) : 340;
  laneX = POS==='left' ? margin : POS==='right' ? (W - laneW - margin) : (W - laneW)/2;
  laneTopY = POS==='center' ? 0 : 96;          // side modes leave room for the HUD band
  strikeY = laneTopY + (H - laneTopY)*0.78;

  centerX = laneX + laneW/2;
  yFar = laneTopY + Math.round((H - laneTopY)*0.06); // top of highway, pulled down a bit (shorter back)
  yNear = H;                                    // bottom of screen (nearest)
  hwBot = laneW*0.82;                           // near half-width (wider front)
  hwTop = hwBot * HW_TOP_FRAC;                  // far half-width (thinner back)
  // screenY(D) = yHorizon + Kp/D, anchored so D=DFAR -> yFar and D=DNEAR -> strikeY
  Kp = (strikeY - yFar) / (1 - DNEAR/DFAR);
  yHorizon = yFar - Kp/DFAR;
}
window.addEventListener('resize', resize);

// depth for a note's time-progress p (0 = far spawn, 1 = strike, >1 = past, at viewer)
function depthAt(p){ return DFAR + (DNEAR - DFAR)*p; }
function projY(D){ return yHorizon + Kp/Math.max(0.34, D); }    // clamp so it can't blow up
function hwAtY(y){                                              // trapezoid half-width at screen-y
  const f = (y - yFar)/(yNear - yFar);
  return hwTop + (hwBot - hwTop)*Math.max(0, Math.min(1.2, f));
}
// Build a jagged lightning path down the highway centerline (fixed for its life
// so it doesn't flicker). Triggered on big combos / milestones / records.
function fireBolt(intensity, gold){
  const N = 11, pts = [];
  for (let i=0;i<=N;i++){
    const t = i/N, y = yFar + (strikeY - yFar)*t;
    const jx = (i===0 || i===N) ? 0 : (Math.random()*2-1) * hwAtY(y) * 0.45;
    pts.push({ x: centerX + jx, y });
  }
  bolt = { born: clock(), pts, gold, intensity };
}
function drawBolt(now){
  if (!bolt) return;
  const a = 1 - (now - bolt.born)/300;          // ~300ms life
  if (a <= 0){ bolt = null; return; }
  const col = bolt.gold ? '255,228,120' : '198,176,255';
  const path = ()=>{ ctx.beginPath(); ctx.moveTo(bolt.pts[0].x, bolt.pts[0].y);
    for (let i=1;i<bolt.pts.length;i++) ctx.lineTo(bolt.pts[i].x, bolt.pts[i].y); ctx.stroke(); };
  ctx.save(); ctx.globalCompositeOperation = 'lighter'; ctx.lineJoin = 'round';
  ctx.shadowColor = `rgba(${col},${a})`; ctx.shadowBlur = 22*bolt.intensity;
  ctx.strokeStyle = `rgba(${col},${a*0.85})`; ctx.lineWidth = 3 + 7*bolt.intensity*a; path();
  ctx.shadowBlur = 0;                            // bright white core
  ctx.strokeStyle = `rgba(255,255,255,${a*0.9})`; ctx.lineWidth = 1.5 + 2.5*a; path();
  ctx.restore();
}

function draw(now){
  ctx.clearRect(0,0,W,H);

  // highway trapezoid
  ctx.beginPath();
  ctx.moveTo(centerX-hwTop, yFar); ctx.lineTo(centerX+hwTop, yFar);
  ctx.lineTo(centerX+hwBot, yNear); ctx.lineTo(centerX-hwBot, yNear); ctx.closePath();
  ctx.fillStyle = 'rgba(124,92,255,0.12)'; ctx.fill();
  ctx.lineWidth = 2.5; ctx.strokeStyle = 'rgba(124,92,255,0.38)'; ctx.stroke();

  // receding fret rungs (perspective-spaced — bunch up toward the vanishing point)
  ctx.strokeStyle = 'rgba(124,92,255,0.13)'; ctx.lineWidth = 1.5;
  for (const pr of [0.2,0.4,0.6,0.8]){
    const y = projY(depthAt(pr)), hw = hwAtY(y);
    ctx.beginPath(); ctx.moveTo(centerX-hw, y); ctx.lineTo(centerX+hw, y); ctx.stroke();
  }

  // hit zone (trapezoid slice around the strike) + strike line
  const live = liveNote(now);
  const glow = live ? 0.9 : 0.4;
  // compact glowing pad straddling the strike (projecting the full time-window
  // would balloon far down the screen due to perspective, so use a fixed band)
  const yIn  = strikeY - 34;
  const yOut = Math.min(H, strikeY + 92);
  const hwIn = hwAtY(yIn), hwOut = hwAtY(yOut), hwS = hwAtY(strikeY);
  ctx.beginPath();
  ctx.moveTo(centerX-hwIn, yIn); ctx.lineTo(centerX+hwIn, yIn);
  ctx.lineTo(centerX+hwOut, yOut); ctx.lineTo(centerX-hwOut, yOut); ctx.closePath();
  ctx.fillStyle = `rgba(124,92,255,${0.10+0.12*glow})`; ctx.fill();
  ctx.lineWidth = 4; ctx.strokeStyle = `rgba(180,155,255,${0.5+0.5*glow})`;
  ctx.beginPath(); ctx.moveTo(centerX-hwS, strikeY); ctx.lineTo(centerX+hwS, strikeY); ctx.stroke();

  // hit glow — additive burst at the strike; brighter with combo, gold on a record
  if (hitFx > 0.01 || recordFx > 0.01){
    const fx = Math.max(hitFx, recordFx);
    const gold = recordFx > hitFx*0.9;
    const col = gold ? '255,207,58' : '150,110,255';
    const r = hwS * (1.5 + 2.4*fx);
    const g = ctx.createRadialGradient(centerX, strikeY, 0, centerX, strikeY, r);
    g.addColorStop(0,   `rgba(${col},${0.55*fx})`);
    g.addColorStop(0.55,`rgba(${col},${0.18*fx})`);
    g.addColorStop(1,   `rgba(${col},0)`);
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = g; ctx.fillRect(centerX-r, strikeY-r, r*2, r*2);
    ctx.restore();
  }

  drawBolt(now);   // lightning down the highway on big combos

  // notes — projected with perspective; tiny in the distance, rushing toward the
  // viewer (bigger) as they approach. Doubles render two emojis side by side,
  // each with its own live matcher count beneath it.
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const thrNow = thresholdFor(now);
  for (const note of notes){
    const p = (now - (note.targetTime - DIFF.lead)) / DIFF.lead;
    const D = Math.max(0.34, depthAt(p));
    const y = projY(D);
    const size = NOTE_SIZE / D;
    let alpha = 1;
    if (note.state==='hit')  alpha = 1 - (now-note.resolvedAt)/600;
    if (note.state==='miss') alpha = (1 - (now-note.resolvedAt)/600)*0.55;
    ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
    const n = note.emojis.length;
    const gap = n>1 ? size*0.6 : 0;            // side-by-side offset for a double
    ctx.font = `${Math.max(9, size)}px "Segoe UI Emoji", sans-serif`;
    note.emojis.forEach((em,i)=>{ ctx.fillText(em, centerX + (n>1 ? (i?gap:-gap) : 0), y); });
    // live per-emoji matcher counts beneath each emoji (only the active note)
    if (note===live && note.state==='falling'){
      const req = noteReq(thrNow, note);
      ctx.font = `700 ${Math.max(12, size*0.28)}px Segoe UI, sans-serif`;
      note.emojis.forEach((em,i)=>{
        ctx.fillStyle = note.hits[i].size>=req ? getCss('--good') : '#fff';
        ctx.fillText(`${note.hits[i].size}/${req}`, centerX + (n>1 ? (i?gap:-gap) : 0), y + size*0.58);
      });
    }
    ctx.globalAlpha = 1;
  }

  // popups (at the strike)
  for (const pp of popups){
    const a = (now - pp.born)/700; if (a>1) continue;
    ctx.globalAlpha = 1-a;
    ctx.font = '800 30px Segoe UI, sans-serif'; ctx.textAlign='center';
    ctx.fillStyle = pp.good ? getCss('--good') : getCss('--bad');
    ctx.fillText(pp.label, centerX, strikeY - 50 - 40*a);
    ctx.globalAlpha = 1;
  }
  for (let i=popups.length-1;i>=0;i--) if (now-popups[i].born>700) popups.splice(i,1);
}
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

/* ============================================================ HUD ======== */
const el = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function paintHud(){
  el('score').innerHTML = `${score.band.toLocaleString()}<small>pts</small>`;
  el('combo').innerHTML = score.combo>0 ? `COMBO <b>x${score.mult}</b> &middot; ${score.combo}` : '&nbsp;';
  el('hype-fill').style.width = (score.hype*100).toFixed(0)+'%';
  el('hype-wrap').classList.toggle('full', score.hype>=1);
  el('chatrate').innerHTML = `<b>${chatRate.total}</b> / <b class="uniq">${chatRate.uniq}</b><small>MSGS / UNIQUE PER MIN</small>`;

  const top = [...score.users.entries()].sort((a,b)=>b[1].pts-a[1].pts).slice(0,5);
  el('board').innerHTML = top.map(([nm,u],i)=>
    `<div class="board-row ${i===0?'mvp':''}"><span class="nm">${esc(nm)}</span><span class="pt">${u.pts.toLocaleString()}</span></div>`
  ).join('') || '<div class="board-row"><span class="nm" style="opacity:.4">waiting for swarm…</span></div>';
}
function paintFeed(){
  if (!feedDirty) return; feedDirty = false;
  el('chatfeed').innerHTML = feedMsgs.slice(-26).map(m=>
    `<div class="fmsg ${m.hit?'hit':''}"><span class="fu">${esc(m.u)}:</span> ${esc(m.t)}</div>`
  ).join('');
}

/* ====================================================== CHAT RATE ======== */
/* messages/min and unique-chatters/min over a rolling 60s window. Recomputed
   ~2x/sec (not per frame) since heavy chat makes the window large. */
let chatRate = { total:0, uniq:0 };
function computeChatRate(now){
  const cut = now - 60000;
  while (msgWin.length && msgWin[0].ts < cut) msgWin.shift();
  const s = new Set();
  for (const m of msgWin) s.add(m.u);
  chatRate = { total: msgWin.length, uniq: s.size };
}

/* ============================================================ CLOCK ====== */
let _t0 = null;
function clock(){ return _t0===null ? 0 : performance.now() - _t0; }

/* =================================================== DEV TEST HARNESS ==== */
let testerSeq = 0;
function wireHarness(){
  // one-tap emoji buttons: each tap = a fresh distinct chatter typing that emoji,
  // so you can build (or miss) a note's swarm by hand, bots on or off.
  el('ctl-emojis').innerHTML = CHORDS.map(e=>`<button class="emoji" data-e="${e}">${e}</button>`).join('');
  el('ctl-emojis').addEventListener('click', ev=>{
    const b = ev.target.closest('button'); if(!b) return;
    ingest(b.dataset.e, {username:`chatter_${++testerSeq}`});
  });
  // bots toggle
  el('ctl-bots').addEventListener('click', ()=>{
    simCfg.bots = !simCfg.bots;
    el('ctl-bots').textContent = 'Bots: ' + (simCfg.bots?'ON':'OFF');
    el('ctl-bots').classList.toggle('off', !simCfg.bots);
  });
  // sliders
  el('ctl-count').addEventListener('input', e=>{
    simCfg.count = +e.target.value; el('ctl-count-v').textContent = simCfg.count;
  });
  el('ctl-eager').addEventListener('input', e=>{
    simCfg.eagerMult = (+e.target.value)/100; el('ctl-eager-v').textContent = e.target.value+'%';
  });
  // swarm-this-note: one click lands the current note
  el('ctl-swarm').addEventListener('click', ()=>{
    const now = clock(); const note = liveNote(now);
    if (!note){ el('ctl-status').textContent = 'no note'; setTimeout(()=>el('ctl-status').textContent='SIM',900); return; }
    const need = noteReq(thresholdFor(now), note) + 1;
    note.emojis.forEach(em=>{ for (let i=0;i<need;i++) ingest(em, {username:`swarm_${++testerSeq}`}); });
  });
  // type as YOU
  el('ctl-msg').addEventListener('keydown', e=>{
    if (e.key!=='Enter') return;
    const v = e.target.value.trim(); if(!v) return;
    ingest(v, {username:'YOU'}); e.target.value='';
  });
  // audio transport (a browser tab needs a gesture to start; OBS autoplays)
  if (PLAYLIST || YT_SRC){
    el('ctl-audio').style.display = 'flex';
    el('ctl-play').addEventListener('click', startGame);
    el('ctl-skip').addEventListener('click', ()=>{ if (!YT_SRC) playTrack(plIdx+1); });
  }
}

/* Audio entry point: synthetic test track, or load + (auto)play a playlist. */
function startAudio(){
  if (AUDIO.startsWith('test')){
    const bpm = +(AUDIO.split(':')[1]) || 120;
    startTestAudio(bpm);
  } else if (YT_SRC){
    startYouTube();
  } else if (PLAYLIST){
    loadPlaylist(PLAYLIST).then(t=>{ playlist = t; playTrack(0); });
  }
}

/* ============================================================ LOOP ======= */
let source = null;
let lastSimTick = 0, lastFrame = 0, lastRate = 0;
function frame(){
  const now = clock();
  const dt = lastFrame ? (now - lastFrame)/1000 : 0; lastFrame = now;
  if (started){                                       // nothing runs until Play
    score.hype = Math.max(0, score.hype - 0.035*dt); // slow passive ebb
    hitFx = Math.max(0, hitFx - dt*2.6); recordFx = Math.max(0, recordFx - dt*1.1);
    if (audioActive) ensureNotesAudio(now); else ensureNotes(now);
    if (source && source.tick && now - lastSimTick > 90){ source.tick(now); lastSimTick = now; }
    if (now - lastRate > 500){ computeChatRate(now); lastRate = now; }
    resolveNotes(now);
  }
  draw(now);
  paintHud();
  if (HARNESS) paintFeed();
  requestAnimationFrame(frame);
}

function boot(){
  resize();
  el('ver-pill').textContent = 'v' + VERSION;
  _t0 = performance.now();
  if (HARNESS) wireHarness();

  // Build the chat source, but DON'T start anything yet (see startGame / Play).
  if (SIM){
    source = SimSource();
    source.onMessage(ingest);
    el('hint').textContent = 'ChordSwarm v'+VERSION+' · sim test harness · pos:'+POS+' · '+(qs.get('difficulty')||'normal');
  } else if (CHANNEL || CHATROOM){
    source = KickPusherSource({ channel:CHANNEL, chatroom:CHATROOM });
    source.onMessage(ingest);
    pendingKickStart = true;            // connect on Play (or immediately if auto-start)
    if (DEV) simCfg.bots = false;
    el('hint').textContent = 'ChordSwarm v'+VERSION+' · kick:'+(CHANNEL || ('room '+CHATROOM));
  } else if (DEV){
    source = SimSource(); source.onMessage(ingest); simCfg.bots = false;
    el('ctl-bots').textContent = 'Bots: OFF'; el('ctl-bots').classList.add('off');
    el('hint').textContent = 'ChordSwarm v'+VERSION+' · manual test · pos:'+POS;
  } else {
    el('hint').textContent = 'ChordSwarm v'+VERSION+' · add ?sim=1 (sim) or ?channel=<name> (live Kick)';
  }

  if (NEEDS_PLAY){
    showPlay();                         // blinking Play button + click-anywhere
    if (el('play-btn')) el('play-btn').addEventListener('click', startGame);
    _startGesture = ()=> startGame();
    document.addEventListener('pointerdown', _startGesture);
  } else {
    startGame();                        // pure live overlay (OBS) — auto-start
  }
  requestAnimationFrame(frame);
}
boot();
</script>
