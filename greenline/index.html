<style>
  *{ box-sizing: border-box; margin: 0; padding: 0; }

  html, body{
    min-height: 100%;
    background: #39ff14;
    font-family: 'Luckiest Guy', system-ui, sans-serif;
    letter-spacing: 1px;
    color: #0a0a0a;
  }

  body{
    padding: 24px 16px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* Header */
  .header{
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-align: center;
  }
  .header img.logo{
    width: min(90vw, 480px);
    height: auto;
    filter: drop-shadow(5px 6px 0 rgba(0,0,0,0.45));
  }
  .version{
    display: inline-block;
    background: #0a0a0a;
    color: #ffe82e;
    padding: 4px 12px;
    font-size: 16px;
    border: 3px solid #0a0a0a;
    box-shadow: 4px 4px 0 #ffffff;
  }

  /* Card */
  .card{
    background: #ffffff;
    border: 4px solid #0a0a0a;
    box-shadow: 8px 8px 0 #0a0a0a;
    padding: 22px;
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* Drop zone */
  .drop{
    border: 4px dashed #0a0a0a;
    background: #f6f6f6;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: background .15s ease, transform .12s ease;
    user-select: none;
  }
  .drop:hover{ background: #ffe82e; }
  .drop.dragover{ background: #ffe82e; transform: scale(1.01); }
  .drop h2{ font-size: 28px; margin-bottom: 8px; }
  .drop p{ font-family: system-ui, sans-serif; font-size: 14px; letter-spacing: 0; color: #444; }
  .drop input[type="file"]{ display: none; }

  /* Buttons */
  .btn{
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-decoration: none;
    color: #0a0a0a;
    background: #ffffff;
    padding: 14px 22px;
    font-family: 'Luckiest Guy', sans-serif;
    font-size: 22px;
    border: 4px solid #0a0a0a;
    box-shadow: 5px 5px 0 #0a0a0a;
    cursor: pointer;
    transition: transform .12s ease, box-shadow .12s ease, background .15s ease;
  }
  .btn:hover:not(:disabled){
    transform: translate(-2px, -2px);
    box-shadow: 8px 8px 0 #0a0a0a;
  }
  .btn:disabled{ opacity: 0.4; cursor: not-allowed; }
  .btn.primary{ background: #39ff14; }
  .btn.warn{ background: #ffe82e; }
  .btn svg{ width: 22px; height: 22px; }

  .actions{
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* Canvas */
  .canvas-wrap{
    display: none;
    background: #0a0a0a;
    border: 4px solid #0a0a0a;
    padding: 4px;
    width: 100%;
    overflow: hidden;
  }
  .canvas-wrap.visible{ display: block; }
  canvas{
    display: block;
    width: 100%;
    height: auto;
    max-width: 100%;
  }

  /* Status */
  .status{
    font-family: system-ui, sans-serif;
    font-size: 14px;
    letter-spacing: 0;
    text-align: center;
    min-height: 20px;
    color: #0a0a0a;
  }
  .status.error{ color: #c00; font-weight: 700; }

  /* Footer */
  .footer{
    width: 100%;
    max-width: 760px;
    text-align: center;
    font-family: system-ui, sans-serif;
    font-size: 13px;
    letter-spacing: 0;
    color: #0a0a0a;
    opacity: 0.85;
  }
  .footer a{ color: #0a0a0a; }

  @media (max-width: 480px){
    .btn{ font-size: 18px; padding: 12px 16px; }
    .drop{ padding: 24px 12px; }
    .drop h2{ font-size: 22px; }
    .card{ padding: 16px; box-shadow: 5px 5px 0 #0a0a0a; }
  }

  /* Hide native canvas focus ring */
  canvas:focus{ outline: none; }

  /* Share fallback panel */
  .share-fallback{
    border-top: 3px dashed #0a0a0a;
    padding-top: 14px;
    text-align: center;
    font-family: system-ui, sans-serif;
    letter-spacing: 0;
  }
  .share-fallback p{ font-size: 14px; margin-bottom: 10px; color: #0a0a0a; }
  .share-links{
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .share-link{
    display: inline-flex;
    align-items: center;
    padding: 10px 14px;
    text-decoration: none;
    color: #ffffff;
    background: #0a0a0a;
    border: 3px solid #0a0a0a;
    box-shadow: 4px 4px 0 #ffffff;
    font-family: 'Luckiest Guy', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform .12s ease;
  }
  .share-link:hover{ transform: translate(-2px, -2px); box-shadow: 6px 6px 0 #ffffff; }
  .share-link.tw{ background: #000000; }
  .share-link.fb{ background: #1877f2; }
  .share-link.rd{ background: #ff4500; }
  .share-link.copy{ background: #ffe82e; color: #0a0a0a; }
</style>
</head>
<body>

  <header class="header">
    <img class="logo" src="logo.svg" alt="Green Line — Auto Meme Generator" />
    <span class="version" id="version">v0.1.0</span>
  </header>

  <main class="card">
    <label class="drop" id="drop">
      <h2>DROP A PHOTO HERE</h2>
      <p>Or tap to choose. Faces will be auto-detected.</p>
      <input type="file" id="file" accept="image/*" />
    </label>

    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="canvas"></canvas>
    </div>

    <div class="status" id="status">Pick an image to get started.</div>

    <div class="actions">
      <button class="btn warn" id="resetBtn" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V2L8 6l4 4V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
        RESET
      </button>
      <button class="btn primary" id="downloadBtn" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        DOWNLOAD
      </button>
      <button class="btn" id="shareBtn" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
        SHARE
      </button>
    </div>

    <div class="share-fallback" id="shareFallback" hidden>
      <p>Save the image, then post it:</p>
      <div class="share-links">
        <a id="shareTwitter" class="share-link tw" target="_blank" rel="noopener noreferrer">X / Twitter</a>
        <a id="shareFacebook" class="share-link fb" target="_blank" rel="noopener noreferrer">Facebook</a>
        <a id="shareReddit" class="share-link rd" target="_blank" rel="noopener noreferrer">Reddit</a>
        <button id="copyLinkBtn" class="share-link copy" type="button">Copy link</button>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>Runs 100% in your browser — your photo never leaves your device.</p>
    <p>Part of <a href="../">BookHockeys</a> &middot; <a href="https://github.com/itsavibecode/book">source</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
